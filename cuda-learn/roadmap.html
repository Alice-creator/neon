<script>
const LESSONS = {"pearson-correlation": {"slug": "pearson-correlation", "title": "Correlation", "section": "Statistics", "topic": "Correlation", "description": "Relationship Status Correlation quantifies the strength and direction of the relationship between two variables. It is the bedrock of predictive modeling. If рқ‘Ӣ X is correlated with рқ‘Ң Y, then knowing рқ‘Ӣ X helps us predict рқ‘Ң Y. But beware: correlation can lie. It can show relationships that don't exist, hide relationships that do, and most dangerously, suggest causation where there is none. Covariance: The Raw Ingredient Before Correlation, we must understand Covariance. It measures how two variables change together. рқҗ¶ рқ‘ң рқ‘Ј ( рқ‘Ӣ , рқ‘Ң ) = 1 рқ‘ӣ вҲ’ 1 вҲ‘ рқ‘– = 1 рқ‘ӣ ( рқ‘Ӣ рқ‘– вҲ’ рқ‘Ӣ Лү ) ( рқ‘Ң рқ‘– вҲ’ рқ‘Ң Лү ) Cov(X,Y)= nвҲ’1 1 вҖӢ вҲ‘ i=1 n вҖӢ (X i вҖӢ вҲ’ X Лү )(Y i вҖӢ вҲ’ Y Лү ) Cov > 0 X up, Y up. They move together. Cov < 0 X up, Y down. They move opposite. Cov вүҲ 0 No linear relationship (could still be non-linear!). Problem with Covariance: It's not scaled. If you measure height in meters, Cov is X. If you measure in centimeters, Cov is 10,000X. The number itself is meaningless without context. Correlation Coefficient ( рқ‘ҹ r) Correlation is standardized covariance. We divide by the product of standard deviations to get a unitless number between -1 and 1. рқ‘ҹ = рқҗ¶ рқ‘ң рқ‘Ј ( рқ‘Ӣ , рқ‘Ң ) рқңҺ рқ‘Ӣ рқңҺ рқ‘Ң = вҲ‘ ( рқ‘Ӣ рқ‘– вҲ’ рқ‘Ӣ Лү ) ( рқ‘Ң рқ‘– вҲ’ рқ‘Ң Лү ) вҲ‘ ( рқ‘Ӣ рқ‘– вҲ’ рқ‘Ӣ Лү ) 2 вҲ‘ ( рқ‘Ң рқ‘– вҲ’ рқ‘Ң Лү ) 2 r= Пғ X вҖӢ Пғ Y вҖӢ Cov(X,Y) вҖӢ = вҲ‘(X i вҖӢ вҲ’ X Лү ) 2 вҖӢ вҲ‘(Y i вҖӢ вҲ’ Y Лү ) 2 вҖӢ вҲ‘(X i вҖӢ вҲ’ X Лү )(Y i вҖӢ вҲ’ Y Лү ) вҖӢ Interpreting r r = 1.0 Perfect positive. Points on a line. r = 0.7 Strong positive. Clear trend. r = 0.3 Weak positive. Noisy but visible. r = 0.0 No linear relationship. r = -0.8 Strong negative. Inverse trend. Pearson vs Spearman Not all relationships are straight lines. Choosing the right correlation measure depends on your data. Pearson Correlation ( рқ‘ҹ r) Measures linear relationships. Requires both variables to be approximately normal. Sensitive to outliers (one bad point can destroy your r). If рқ‘Ң = рқ‘Ӣ 2 Y=X 2 , Pearson may be near 0 even though relationship is perfect. Spearman Rank Correlation ( рқңҢ ПҒ) Measures monotonic relationships (always increasing or decreasing). Converts values to Ranks (1st, 2nd, 3rd) then runs Pearson on ranks. Robust to outliers and non-normal data. Perfect for ordinal data (ratings 1-5). Case Study: Bulb Factory Quality Control The Question Is there a relationship between the voltage supplied during manufacturing and the lifespan of the light bulb? If so, we can optimize the voltage setting. The Data We sample 50 bulbs, record the manufacturing voltage (V) and the hours until failure (H). Pearson r 0.72 Spearman ПҒ 0.68 p-value < 0.001 The Interpretation Strong positive correlation. Bulbs manufactured at higher voltage tend to last longer. But wait! Does higher voltage cause longer life? Or do better quality filaments (which last longer) also happen to tolerate higher voltage? We need to run an experiment (A/B test) to prove causation. Interactive Simulator Adjust the correlation coefficient. See how the cloud of points tightens into a line as рқ‘ҹ вҶ’ 1 rвҶ’1 or рқ‘ҹ вҶ’ вҲ’ 1 rвҶ’вҲ’1. Notice how at рқ‘ҹ = 0 r=0, the cloud is a perfect circle. CORRELATION (R) 0.00 -1.0 (SAME) 0.0 (NONE) +1.0 (SAME) SHAPE No Correlation (Random) N = 400 | Gaussian Noise Note: At r=0, points form a circular cloud (Пғ=1). As |r| вҶ’ 1, the Y-noise diminishes, collapsing the cloud onto the regression line. Correlation вү  Causation This is perhaps the most important lesson in statistics. Just because A and B move together, doesn't mean A causes B. There are several possibilities: 1. A causes B (Direct Causation) Rain causes wet ground. Smoking causes cancer. 2. B causes A (Reverse Causation) Cities with more police officers have higher crime rates. Does hiring police cause crime? No, high crime rates cause cities to hire more police. The effect (crime) is driving the apparent cause (police presence), not the other way around. 3. C causes both A and B (Confounding Variable) Ice cream sales and drowning deaths are correlated. Summer (heat) causes both. This is the most common trap. 4. Pure Coincidence (Spurious) With enough variables and time s", "url": "https://www.tensortonic.com/ml-math/statistics/correlation?problem=pearson-correlation", "template": "// Pearson r = ОЈ(xi-xМ„)(yi-Иі) / sqrt(ОЈ(xi-xМ„)ВІ * ОЈ(yi-Иі)ВІ)\n// Need 3 reductions: sum_xy_centered, sum_x2, sum_y2\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n\n__global__ void corr_products(const float* x, const float* y,\n                               float mx, float my,\n                               float* sum_xy, float* sum_x2, float* sum_y2,\n                               int n) {\n    __shared__ float sxy[BLOCK_SIZE], sx2[BLOCK_SIZE], sy2[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    float dx = (i < n) ? x[i] - mx : 0.0f;\n    float dy = (i < n) ? y[i] - my : 0.0f;\n    sxy[tid] = dx * dy;\n    sx2[tid] = dx * dx;\n    sy2[tid] = dy * dy;\n    __syncthreads();\n\n    for (int s = blockDim.x / 2; s > 0; s >>= 1) {\n        if (tid < s) {\n            sxy[tid] += sxy[tid + s];\n            sx2[tid] += sx2[tid + s];\n            sy2[tid] += sy2[tid + s];\n        }\n        __syncthreads();\n    }\n    if (tid == 0) {\n        sum_xy[blockIdx.x] = sxy[0];\n        sum_x2[blockIdx.x] = sx2[0];\n        sum_y2[blockIdx.x] = sy2[0];\n    }\n}\n// r = total_xy / sqrtf(total_x2 * total_y2)\n"}, "svd-decomposition": {"slug": "svd-decomposition", "title": "Singular Value Decomposition", "section": "Linear Algebra", "topic": "SVD", "description": "Introduction Eigendecomposition is powerful, but it has a fatal flaw: it only works on square matrices. Real-world data matrices are rarely square. We might have m users and n movies, or m documents and n words. Singular Value Decomposition (SVD) is the generalization that works on any matrix, regardless of shape. It is arguably the most important matrix factorization in applied linear algebra and machine learning. What SVD Reveals Rank: Number of non-zero singular values = rank of matrix. Range: Column space is spanned by left singular vectors (U). Null Space: Right singular vectors (V) with zero singular values span null space. Condition Number: Ratio of largest to smallest singular value measures numerical stability. Prerequisites SVD builds on eigendecomposition and orthogonality. Understanding PCA also helps, as PCA is often computed using SVD. The Movie Rating Intuition Consider a matrix A where rows are Users and columns are Movies. Entry A[i,j] is user i's rating of movie j. SVD factorizes this into three parts that reveal hidden structure: U (User-Concept) Each row describes a user in terms of hidden \"concepts\" (latent factors). \"Alice: 0.9 Sci-Fi lover, 0.1 Romance fan, 0.3 Action enthusiast\" ОЈ (Strength) Diagonal values show how \"strong\" each concept is in the dataset. \"Sci-Fi concept explains 40% of variance, Romance 25%, Action 15%...\" рқ‘ү рқ‘Ү V T (Concept-Movie) Each column describes a movie in terms of the same concepts. \"The Matrix: 0.95 Sci-Fi, 0.05 Romance, 0.8 Action\" To predict Alice's rating for The Matrix: multiply Alice's concept profile by concept strengths by Matrix's concept profile. The \"concepts\" are learned automatically from the data, not pre-defined! Mathematical Formulation SVD Theorem: For any real matrix A of size m Г— n, there exist orthogonal matrices U and V and a diagonal matrix ОЈ such that: рқҗҙ = рқ‘Ҳ ОЈ рқ‘ү рқ‘Ү A=UОЈV T рқ‘Ҳ U ( рқ‘ҡ Г— рқ‘ҡ mГ—m) Left Singular Vectors Orthogonal: рқ‘Ҳ рқ‘Ү рқ‘Ҳ = рқҗј U T U=I Columns are eigenvectors of рқҗҙ рқҗҙ рқ‘Ү AA T ОЈ ОЈ ( рқ‘ҡ Г— рқ‘ӣ mГ—n) Singular Values Diagonal with entries рқңҺ рқ‘– вүҘ 0 Пғ i вҖӢ вүҘ0 Sorted: рқңҺ 1 вүҘ рқңҺ 2 вүҘ вҖҰ вүҘ 0 Пғ 1 вҖӢ вүҘПғ 2 вҖӢ вүҘвҖҰвүҘ0 рқ‘ү рқ‘Ү V T ( рқ‘ӣ Г— рқ‘ӣ nГ—n) Right Singular Vectors Orthogonal: рқ‘ү рқ‘Ү рқ‘ү = рқҗј V T V=I Rows are eigenvectors of рқҗҙ рқ‘Ү рқҗҙ A T A Relationship to Eigendecomposition The singular values and singular vectors come from eigendecompositions of symmetric matrices: Left Singular Vectors рқҗҙ рқҗҙ рқ‘Ү = рқ‘Ҳ Оӣ рқ‘Ҳ рқ‘Ү AA T =UОӣU T рқ‘Ҳ U columns are eigenvectors of рқҗҙ рқҗҙ рқ‘Ү AA T Right Singular Vectors рқҗҙ рқ‘Ү рқҗҙ = рқ‘ү Оӣ рқ‘ү рқ‘Ү A T A=VОӣV T рқ‘ү V columns are eigenvectors of рқҗҙ рқ‘Ү рқҗҙ A T A Singular values = square roots of eigenvalues: рқңҺ рқ‘– = рқңҶ рқ‘– Пғ i вҖӢ = О» i вҖӢ вҖӢ Interactive: SVD Steps SVD decomposes any linear transformation into three operations: rotate, scale, then rotate. Watch how a unit circle transforms through each step. SVD Transformer Original Space рқ‘Ҙ x MATRIX CONSTRUCTOR VбөҖ (Input Rotation) -45В° ОЈ (Scaling) ПғвӮҒ 2 ПғвӮӮ 1 U (Output Rotation) 30В° CURRENT OPERATION Start with a unit circle. The orthonormal basis vectors (i, j) are aligned with the axes. Geometric Interpretation SVD tells us that every linear transformation, no matter how complex, is equivalent to three simple operations in sequence: 1 рқ‘ү рқ‘Ү V T (Rotation in Input Space) Rotates the coordinate system to align with the \"principal axes\" of the transformation. After this rotation, the transformation will only stretch along coordinate axes. 2 ОЈ ОЈ (Scaling) Stretches or compresses along the principal axes by the singular values. This is where the transformation does its \"work.\" A unit circle becomes an ellipse whose semi-axes have lengths рқңҺ 1 , рқңҺ 2 Пғ 1 вҖӢ ,Пғ 2 вҖӢ , etc. 3 рқ‘Ҳ U (Rotation in Output Space) Final rotation that orients the scaled result to its output position. If the matrix changes dimension ( рқ‘ҡ вү  рқ‘ӣ m оҖ  =n), this rotation happens in the output space which may have different dimensions than input. Unit Circle to Ellipse When you apply any matrix A to a unit circle (or sphere in higher dimensions), the result is an ellipse (or ellipsoid). The singular values are the", "url": "https://www.tensortonic.com/ml-math/linear-algebra/svd?problem=svd-decomposition", "template": "// SVD: A = U * ОЈ * V^T\n// For GPU: use cuSOLVER (NVIDIA's official library)\n#include <cuda_runtime.h>\n#include <cusolverDn.h>\n\n// cuSOLVER approach (recommended for production):\nvoid svd_with_cusolver(float* d_A, int m, int n,\n                        float* d_U, float* d_S, float* d_VT) {\n    cusolverDnHandle_t handle;\n    cusolverDnCreate(&handle);\n\n    // Query workspace size\n    int lwork;\n    cusolverDnSgesvd_bufferSize(handle, m, n, &lwork);\n\n    float *d_work, *d_rwork;\n    cudaMalloc(&d_work,  lwork * sizeof(float));\n    cudaMalloc(&d_rwork, (min(m,n)-1) * sizeof(float));\n\n    int *devInfo;\n    cudaMalloc(&devInfo, sizeof(int));\n\n    // Compute SVD\n    cusolverDnSgesvd(handle, 'A', 'A', m, n,\n                     d_A, m, d_S, d_U, m, d_VT, n,\n                     d_work, lwork, d_rwork, devInfo);\n\n    // Compile: nvcc svd.cu -lcusolver\n    cusolverDnDestroy(handle);\n}\n"}, "standard-error-calculation": {"slug": "standard-error-calculation", "title": "Sampling Distributions", "section": "Statistics", "topic": "Sampling Distributions", "description": "Introduction In the previous chapter, we learned that a Sample is a subset of a Population. But here is an important realization: if you take one sample and calculate its mean, you get one number. If you take another random sample of the same size, you get a different number. This raises a critical question: How much can my sample mean vary from sample to sample? If you kept doing this, taking thousands of samples and plotting their means, you would create a new distribution. This is the Sampling Distribution. It is not a distribution of raw data; it is a probability distribution of a statistic (like the mean). Why This Matters for ML Engineers In Machine Learning, we treat our training set as a single sample from all possible data. Understanding sampling distributions helps answer: \"If I retrained this model on different data, how much would my accuracy fluctuate?\" \"Is the 2% improvement from Model B actually significant, or just noise?\" \"How confident can I be in my cross-validation score?\" Building Intuition: The Bulb Factory Example Imagine you run a light bulb factory and want to know the average lifespan of all bulbs produced (the population mean рқңҮ Ој). The Problem You cannot test every single bulb (destructive testing). You only have time to sample 50 bulbs this week. The Solution Use the sample mean рқ‘Ҙ Лү x Лү as an estimate of рқңҮ Ој. But here is the catch: if another engineer tested 50 different bulbs, they would get a slightly different average. The Sampling Distribution tells us the range of values we should expect for рқ‘Ҙ Лү x Лү and how confident we can be. The Intuition Think of it this way: The sampling distribution is like a \"meta-distribution\" - it describes the behavior of statistics (like means) calculated from many hypothetical samples, not the behavior of individual data points. The Core Concept Imagine a \"God View\" where we know the entire population. We take repeated samples of a fixed size рқ‘ӣ n. Step 1 Take Sample 1 Calc рқ‘Ҙ Лү 1 x Лү 1 вҖӢ Step 2 Take Sample 2 Calc рқ‘Ҙ Лү 2 x Лү 2 вҖӢ Step 3 Repeat 1000x рқ‘Ҙ Лү 3 вҖҰ рқ‘Ҙ Лү 1000 x Лү 3 вҖӢ вҖҰ x Лү 1000 вҖӢ Step 4 Plot histogram Sampling Dist The resulting histogram of these means is the Sampling Distribution of the Sample Mean. Notice we are plotting statistics (means), not raw data points. Interactive Demo: Watch It Happen Click \"Start Sampling\" to watch how repeatedly sampling from a skewed population creates a bell-shaped distribution of sample means. This is the Central Limit Theorem in action! Sampling Distribution Simulator Watch how repeatedly sampling from a skewed population creates a normal distribution of means. SAMPLE SIZE (N) 30 SPEED 100ms Start Sampling Take 1 Sample Reset CURRENT SAMPLE N=30 Raw Data Point LIFESPANS SAMPLING DIST. 0 MEANS -- Pop Mean: 51.1 -- POP. MEAN 51.10 MEAN OF MEANS 0.00 STD. ERROR 0.00 SAMPLES 0 Observation:Notice how the Mean of Means rapidly approaches the Population Mean, and the distribution becomes increasingly Normal (symmetric) as more samples are added вҖ“ even though individual samples are highly variable. Sampling Distribution of the Mean If we draw samples from a population with mean рқңҮ Ој and standard deviation рқңҺ Пғ, the distribution of sample means рқ‘Ҙ Лү x Лү follows two fundamental rules: Rule 1: Unbiased Estimator рқңҮ рқ‘Ҙ Лү = рқңҮ Ој x Лү вҖӢ =Ој The average of all your sample means equals the true population mean. There is no systematic tendency to over or underestimate. Example: If true mean is 50, some samples give 48, some give 52, but the average of all sample means is exactly 50. Rule 2: Standard Error рқңҺ рқ‘Ҙ Лү = рқңҺ рқ‘ӣ Пғ x Лү вҖӢ = n вҖӢ Пғ вҖӢ The spread of sample means is smaller than the spread of individual data points. As sample size рқ‘ӣ n increases, the means cluster tighter around рқңҮ Ој. Example: If рқңҺ = 20 Пғ=20 and рқ‘ӣ = 100 n=100, then рқ‘Ҷ рқҗё = 20 / 10 = 2 SE=20/10=2. Crucial: Standard Deviation vs Standard Error This is a common interview question. Many candidates confuse these two. Here is the difference: Metric Symbol Formula What it measures Standard Deviatio", "url": "https://www.tensortonic.com/ml-math/statistics/sampling-distribution?problem=standard-error-calculation", "template": "// Standard Error: SE = Пғ / sqrt(n)\n// Пғ = std dev of population (or sample std dev as estimate)\n#include <cuda_runtime.h>\n\n// After computing std_dev with reduce_variance kernel:\n// SE = std_dev / sqrtf(n)\n// This is a single scalar computation on the host side.\n\n// For computing std dev of sample means (bootstrap):\n__global__ void compute_sample_means(const float* data, float* means,\n                                      int n_total, int sample_size,\n                                      int n_samples) {\n    int s = blockIdx.x * blockDim.x + threadIdx.x;\n    if (s >= n_samples) return;\n\n    // Each thread computes mean of one sample\n    float sum = 0;\n    int start = s * sample_size;\n    for (int i = 0; i < sample_size && start + i < n_total; i++)\n        sum += data[start + i];\n    means[s] = sum / sample_size;\n}\n// SE = std_dev(means) вҖ” run variance reduction on means array\n"}, "numerical-limits": {"slug": "numerical-limits", "title": "Limits and Continuity", "section": "Calculus", "topic": "Numerical Limits", "description": "Introduction Before we can discuss derivatives (the engine of optimization) or integrals (the foundation of probability), we must understand the bedrock they stand on: limits. Calculus is the mathematics of change. But change happens at an instant, and measuring something \"at an instant\" involves dividing by zero ( О” рқ‘Ұ 0 0 О”y вҖӢ ). To bypass this mathematical impossibility, we use limits: asking not \"what is the value at this point,\" but \"what value do we approach as we get infinitely close?\" Why Limits Matter for ML Derivatives: The definition of derivative is a limit: рқ‘“ вҖІ ( рқ‘Ҙ ) = lim вҒЎ в„Һ вҶ’ 0 рқ‘“ ( рқ‘Ҙ + в„Һ ) вҲ’ рқ‘“ ( рқ‘Ҙ ) в„Һ f вҖІ (x)=lim hвҶ’0 вҖӢ h f(x+h)вҲ’f(x) вҖӢ Gradient Descent: Requires continuous, differentiable functions. Limits ensure this. Activation Functions: Understanding where functions break (discontinuities) explains ReLU vs Sigmoid choices. Convergence: Training loops converge when loss approaches a limit. What is a Limit? A limit describes the value a function approaches as the input approaches some value. The function doesn't need to actually reach that value, it just needs to get arbitrarily close. Classic Example Consider рқ‘“ ( рқ‘Ҙ ) = рқ‘Ҙ 2 вҲ’ 1 рқ‘Ҙ вҲ’ 1 f(x)= xвҲ’1 x 2 вҲ’1 вҖӢ . If we plug in x = 1, we get 0 0 0 0 вҖӢ , which is undefined. But we can factor: рқ‘Ҙ 2 вҲ’ 1 рқ‘Ҙ вҲ’ 1 = ( рқ‘Ҙ + 1 ) ( рқ‘Ҙ вҲ’ 1 ) рқ‘Ҙ вҲ’ 1 = рқ‘Ҙ + 1 xвҲ’1 x 2 вҲ’1 вҖӢ = xвҲ’1 (x+1)(xвҲ’1) вҖӢ =x+1 for x != 1. So as x approaches 1, f(x) approaches 2. The limit exists even though f(1) is undefined! Left-hand Limit lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ вҲ’ рқ‘“ ( рқ‘Ҙ ) lim xвҶ’c вҲ’ вҖӢ f(x) Approaching c from values less than c (from the left on number line). Right-hand Limit lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ + рқ‘“ ( рқ‘Ҙ ) lim xвҶ’c + вҖӢ f(x) Approaching c from values greater than c (from the right). Limit Exists If and Only If The limit lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ рқ‘“ ( рқ‘Ҙ ) = рқҗҝ lim xвҶ’c вҖӢ f(x)=L exists if and only if both one-sided limits exist AND are equal: lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ вҲ’ рқ‘“ ( рқ‘Ҙ ) = lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ + рқ‘“ ( рқ‘Ҙ ) = рқҗҝ lim xвҶ’c вҲ’ вҖӢ f(x)=lim xвҶ’c + вҖӢ f(x)=L Interactive: Approaching a Limit Watch how both sides approach the same value as we get closer to the point. The function has a \"hole\" at x = 1, but the limit still exists! Approaching the Limit Visualize lim вҒЎ рқ‘Ҙ вҶ’ 1 рқ‘Ҙ 2 вҲ’ 1 рқ‘Ҙ вҲ’ 1 = 2 lim xвҶ’1 вҖӢ xвҲ’1 x 2 вҲ’1 вҖӢ =2. The hole at x=1 doesn't stop the limit! Zoom In 10x Animate Approach x=1 y=2 DISTANCE VALUES TABLE Left Limit рқ‘Ҙ вҶ’ 1 вҲ’ xвҶ’1 вҲ’ x -0.5000 f(x) 0.5000 Right Limit рқ‘Ҙ вҶ’ 1 + xвҶ’1 + x 2.5000 f(x) 3.5000 Limit Exists! Notice that as x gets closer to 1 from BOTH sides, f(x) gets closer to 2. Even though f(1) is undefined (hole), we say lim вҒЎ рқ‘Ҙ вҶ’ 1 рқ‘“ ( рқ‘Ҙ ) = 2 lim xвҶ’1 вҖӢ f(x)=2. The Epsilon-Delta Definition The formal definition of a limit is often considered one of the hardest concepts in Calculus 1. But it's actually just a way of describing a guarantee of precision. The Manufacturing Analogy Imagine you are manufacturing a high-precision piston (input рқ‘Ҙ x) that must fit into a cylinder (output рқ‘“ ( рқ‘Ҙ ) f(x)). 1. The Goal (L): The cylinder has a perfect target width, say 10cm. 2. The Tolerance ( рқң– Пө): The customer says, \"The width must be within 0.01cm of the target.\" This is your error margin. 3. The Input Precision ( рқӣҝ Оҙ): You ask, \"How precise must my piston mold be?\" Maybe if the mold is within 0.005cm of the target size, the final piston will be within the customer's tolerance. The Limit Exists If: No matter how strict the customer's tolerance ( рқң– Пө) is, you can always find a high-enough precision for your machine ( рқӣҝ Оҙ) to satisfy it. Formal Definition We say lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ рқ‘“ ( рқ‘Ҙ ) = рқҗҝ lim xвҶ’c вҖӢ f(x)=L if: For every рқң– > 0 Пө>0 (the challenge), there exists a рқӣҝ > 0 Оҙ>0 (the response) such that: 0 < вҲЈ рқ‘Ҙ вҲ’ рқ‘җ вҲЈ < рқӣҝ вҹ№ вҲЈ рқ‘“ ( рқ‘Ҙ ) вҲ’ рқҗҝ вҲЈ < рқң– 0<вҲЈxвҲ’cвҲЈ<Оҙвҹ№вҲЈf(x)вҲ’LвҲЈ<Пө Translation: If the input рқ‘Ҙ x is within рқӣҝ Оҙ of рқ‘җ c, then the output рқ‘“ ( рқ‘Ҙ ) f(x) is guaranteed to be within рқң– Пө of рқҗҝ L. Limit Laws These rules let us compute limits of complex expressions from simpler ones. If lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ рқ‘“ ( рқ‘Ҙ ) = рқҗҝ lim xвҶ’c вҖӢ f(x)=L and lim вҒЎ рқ‘Ҙ вҶ’ рқ‘җ рқ‘” ( рқ‘Ҙ ) = рқ‘Җ lim xвҶ’c вҖӢ g(x)=M: Sum/Difference lim вҒЎ [ рқ‘“ ( рқ‘Ҙ ) Вұ рқ‘” ( рқ‘Ҙ ) ] = рқҗҝ Вұ", "url": "https://www.tensortonic.com/ml-math/calculus/limits-continuity?problem=numerical-limits", "template": "// Evaluate function near a limit point: lim_{xвҶ’a} f(x)\n// Use many x values approaching a in parallel\n#include <cuda_runtime.h>\n\n__device__ float f(float x) {\n    // TODO: replace with your function\n    // Example: f(x) = sin(x)/x вҖ” limit as xвҶ’0 is 1\n    return (fabsf(x) < 1e-7f) ? 1.0f : sinf(x) / x;\n}\n\n__global__ void eval_near_limit(float a, float* epsilons,\n                                 float* f_values, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n    float x = a + epsilons[i];  // approach a from different distances\n    f_values[i] = f(x);\n}\n// As epsilons вҶ’ 0, f_values should converge to the limit\n"}, "gram-schmidt": {"slug": "gram-schmidt", "title": "Orthogonality", "section": "Linear Algebra", "topic": "Gram-Schmidt", "description": "Introduction \"Orthogonal\" comes from Greek: orthos (right, correct) + gonia (angle). In everyday language, it means \"perpendicular\" or \"at a right angle.\" In mathematics and machine learning, orthogonality represents a deeper concept: complete independence. Two orthogonal vectors share absolutely no common direction. In the context of data, if two features are orthogonal, knowing one tells you nothing about the other. They provide completely unique, non-redundant information. This is why orthogonality is sometimes called the \"Holy Grail\" of feature engineering. Why Orthogonality Matters in ML Feature Independence: Orthogonal features maximize information content per feature. Numerical Stability: Orthogonal matrices are perfectly conditioned (condition number = 1). Gradient Flow: Orthogonal weight matrices preserve gradient magnitudes in deep networks. Efficient Computation: Inverting orthogonal matrices is trivial (just transpose). Orthogonality is the mathematical engine behind algorithms like PCA, SVD, QR decomposition, and orthogonal weight initialization in neural networks. Orthogonal Vectors Two vectors рқ‘ў u and рқ‘Ј v in рқ‘… рқ‘ӣ R n are orthogonal (written рқ‘ў вҠҘ рқ‘Ј uвҠҘv) if their inner product (dot product) is zero: рқ‘ў вӢ… рқ‘Ј = рқ‘ў рқ‘Ү рқ‘Ј = вҲ‘ рқ‘– = 1 рқ‘ӣ рқ‘ў рқ‘– рқ‘Ј рқ‘– = 0 uвӢ…v=u T v=вҲ‘ i=1 n вҖӢ u i вҖӢ v i вҖӢ =0 This definition extends to any finite dimension n, not just 2D or 3D. Example: Verifying Orthogonality Let рқ‘ў = [ 1 , 2 , 3 ] u=[1,2,3] and рқ‘Ј = [ 1 , 1 , вҲ’ 1 ] v=[1,1,вҲ’1]. Are they orthogonal? u В· v = (1)(1) + (2)(1) + (3)(-1) u В· v = 1 + 2 - 3 = 0 Yes, u and v are orthogonal! The Zero Vector The zero vector 0 0 is orthogonal to every vector (including itself), since 0 вӢ… рқ‘Ј = 0 0вӢ…v=0 for any v. However, when we talk about orthogonal sets or bases, we typically exclude the zero vector. Orthogonal Sets A set of vectors { рқ‘Ј 1 , рқ‘Ј 2 , вҖҰ , рқ‘Ј рқ‘ҳ } {v 1 вҖӢ ,v 2 вҖӢ ,вҖҰ,v k вҖӢ } is an orthogonal set if every pair is orthogonal: рқ‘Ј рқ‘– вӢ… рқ‘Ј рқ‘— = 0 for all рқ‘– вү  рқ‘— v i вҖӢ вӢ…v j вҖӢ =0for all i оҖ  =j Key Theorem: An orthogonal set of non-zero vectors is always linearly independent. This makes orthogonal vectors extremely useful as basis vectors. Geometric Intuition The dot product has a beautiful geometric interpretation that explains why orthogonal vectors have dot product zero: рқ‘ў вӢ… рқ‘Ј = вҲЈ вҲЈ рқ‘ў вҲЈ вҲЈ вӢ… вҲЈ вҲЈ рқ‘Ј вҲЈ вҲЈ вӢ… cos вҒЎ ( рқңғ ) uвӢ…v=вҲЈвҲЈuвҲЈвҲЈвӢ…вҲЈвҲЈvвҲЈвҲЈвӢ…cos(Оё) When рқңғ = 90 В° Оё=90В°, cos вҒЎ ( 90 В° ) = 0 cos(90В°)=0, so the dot product is zero. Projection Interpretation The dot product measures \"how much of u lies in the direction of v.\" proj рқ‘Ј ( рқ‘ў ) = рқ‘ў вӢ… рқ‘Ј вҲЈ вҲЈ рқ‘Ј вҲЈ вҲЈ 2 рқ‘Ј proj v вҖӢ (u)= вҲЈвҲЈvвҲЈвҲЈ 2 uвӢ…v вҖӢ v If dot = 0, projection = 0. The vectors share no common direction. Pythagorean Theorem For orthogonal vectors, the Pythagorean theorem holds: вҲЈ вҲЈ рқ‘ў + рқ‘Ј вҲЈ вҲЈ 2 = вҲЈ вҲЈ рқ‘ў вҲЈ вҲЈ 2 + вҲЈ вҲЈ рқ‘Ј вҲЈ вҲЈ 2 вҲЈвҲЈu+vвҲЈвҲЈ 2 =вҲЈвҲЈuвҲЈвҲЈ 2 +вҲЈвҲЈvвҲЈвҲЈ 2 This is because the cross-term 2 ( рқ‘ў вӢ… рқ‘Ј ) 2(uвӢ…v) vanishes. Interactive: Projection & Orthogonality Adjust the angle of vector u to see its projection onto v. When the projection vanishes, the vectors are orthogonal. Vector Projection Decomposing u into components parallel and perpendicular to v. v u ANGLE 45В° 0В° (Parallel) 90В° (Perp) 180В° DECOMPOSITION Projection ( proj рқ‘Ј рқ‘ў ) (proj v вҖӢ u) 70.7 PARALLEL Rejection ( рқ‘ў вҲ’ proj ) (uвҲ’proj) 70.7 PERP Dot Product: 7071 When the angle is 90В° (or 270В°), the dot product is zero, and the projection vanishes. Orthonormal Bases An orthonormal set is an orthogonal set where every vector also has unit length (norm = 1). This is the \"gold standard\" for coordinate systems. 1. Orthogonal рқ‘’ рқ‘– вӢ… рқ‘’ рқ‘— = 0 e i вҖӢ вӢ…e j вҖӢ =0 (if i вү  j) 2. Normalized вҲЈ вҲЈ рқ‘’ рқ‘– вҲЈ вҲЈ = 1 вҲЈвҲЈe i вҖӢ вҲЈвҲЈ=1 (unit length) Combined using Kronecker delta: рқ‘’ рқ‘– вӢ… рқ‘’ рқ‘— = рқӣҝ рқ‘– рқ‘— e i вҖӢ вӢ…e j вҖӢ =Оҙ ij вҖӢ Why Orthonormal Bases are Powerful In an orthonormal basis, finding coordinates is trivial. You don't need to solve a system of equations; you just take dot products! рқ‘Ҙ = вҲ‘ рқ‘– = 1 рқ‘ӣ ( рқ‘Ҙ вӢ… рқ‘’ рқ‘– ) рқ‘’ рқ‘– x=вҲ‘ i=1 n вҖӢ (xвӢ…e i вҖӢ )e i вҖӢ The coordinate for рқ‘’ рқ‘– e i вҖӢ is just рқ‘Ҙ вӢ… рқ‘’ рқ‘– xвӢ…e i вҖӢ . This is why Fourier series and Wav", "url": "https://www.tensortonic.com/ml-math/linear-algebra/orthogonality?problem=gram-schmidt", "template": "// Gram-Schmidt: orthogonalize a set of vectors\n// Sequential in nature вҖ” each step depends on previous\n// GPU parallelizes the dot products and projections\n#include <cuda_runtime.h>\n\n// Project v onto u: proj = (vВ·u)/(uВ·u) * u\n__global__ void dot_product(const float* a, const float* b, float* out, int n) {\n    __shared__ float smem[256];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n    smem[tid] = (i < n) ? a[i] * b[i] : 0.0f;\n    __syncthreads();\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n\n// Subtract projection: v = v - (vВ·u/uВ·u) * u\n__global__ void subtract_projection(float* v, const float* u,\n                                     float dot_vu, float dot_uu, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n)\n        v[i] -= (dot_vu / dot_uu) * u[i];\n}\n"}, "gradient-computation": {"slug": "gradient-computation", "title": "Partial Derivatives", "section": "Calculus", "topic": "Gradient", "description": "Introduction In single-variable calculus, the derivative рқ‘‘ рқ‘Ұ рқ‘‘ рқ‘Ҙ dx dy вҖӢ tells us the rate of change of y with respect to x. But neural networks have millions of parameters. A loss function might depend on weights рқ‘Ө 1 , рқ‘Ө 2 , вҖҰ , рқ‘Ө 1000000 w 1 вҖӢ ,w 2 вҖӢ ,вҖҰ,w 1000000 вҖӢ . We can't simply ask \"what's the slope?\" because the function slopes differently in every direction. Instead, we ask: \"How does the output change if I wiggle just one input while holding all others constant?\" Why Partial Derivatives Matter Gradient Descent: The gradient is a vector of partial derivatives. Backpropagation: Computing partials for every weight in a neural network. Optimization: Finding which direction reduces loss the most. Sensitivity Analysis: Which inputs affect outputs the most? Formal Definition Let рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) f(x,y) be a function of two variables. The partial derivative with respect to x is: вҲӮ рқ‘“ вҲӮ рқ‘Ҙ = lim вҒЎ в„Һ вҶ’ 0 рқ‘“ ( рқ‘Ҙ + в„Һ , рқ‘Ұ ) вҲ’ рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) в„Һ вҲӮx вҲӮf вҖӢ =lim hвҶ’0 вҖӢ h f(x+h,y)вҲ’f(x,y) вҖӢ Note the вҲӮ вҲӮ symbol (partial) instead of d. This explicitly indicates that y is held constant. Similarly, the partial with respect to y is: вҲӮ рқ‘“ вҲӮ рқ‘Ұ = lim вҒЎ в„Һ вҶ’ 0 рқ‘“ ( рқ‘Ҙ , рқ‘Ұ + в„Һ ) вҲ’ рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) в„Һ вҲӮy вҲӮf вҖӢ =lim hвҶ’0 вҖӢ h f(x,y+h)вҲ’f(x,y) вҖӢ The Key Insight When computing вҲӮ рқ‘“ вҲӮ рқ‘Ҙ вҲӮx вҲӮf вҖӢ , treat y as if it were a constant number (like 5 or pi). Then differentiate with respect to x using your normal single-variable rules. Notation & Computation Several notations are used for partial derivatives: вҲӮ рқ‘“ вҲӮ рқ‘Ҙ вҲӮx вҲӮf вҖӢ Leibniz рқ‘“ рқ‘Ҙ f x вҖӢ Subscript вҲӮ рқ‘Ҙ рқ‘“ вҲӮ x вҖӢ f Operator рқҗ· рқ‘Ҙ рқ‘“ D x вҖӢ f D-notation Worked Example Let рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = рқ‘Ҙ 2 рқ‘Ұ + 3 рқ‘Ұ 3 + 5 f(x,y)=x 2 y+3y 3 +5. Find all partial derivatives. Partial with respect to x: Treat y as constant: вҲӮ рқ‘“ вҲӮ рқ‘Ҙ = 2 рқ‘Ҙ рқ‘Ұ + 0 + 0 = 2 рқ‘Ҙ рқ‘Ұ вҲӮx вҲӮf вҖӢ =2xy+0+0=2xy Partial with respect to y: Treat x as constant: вҲӮ рқ‘“ вҲӮ рқ‘Ұ = рқ‘Ҙ 2 + 9 рқ‘Ұ 2 + 0 = рқ‘Ҙ 2 + 9 рқ‘Ұ 2 вҲӮy вҲӮf вҖӢ =x 2 +9y 2 +0=x 2 +9y 2 Geometric Intuition Consider a 3D surface рқ‘§ = рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) z=f(x,y) representing a landscape with hills and valleys. Standing at a point (x, y), you can walk in infinitely many directions. Slicing the Surface When we compute вҲӮ рқ‘“ вҲӮ рқ‘Ҙ вҲӮx вҲӮf вҖӢ , we \"slice\" the 3D surface with a vertical plane where y = constant. This slice creates a 2D curve. The partial derivative is the slope of this curve at our point. Walking East-West вҲӮ рқ‘“ вҲӮ рқ‘Ҙ вҲӮx вҲӮf вҖӢ tells you the slope if you walk strictly in the x-direction (East-West). вҲӮ рқ‘“ вҲӮ рқ‘Ұ вҲӮy вҲӮf вҖӢ tells you the slope if you walk strictly in the y-direction (North-South). The Gradient Vector The gradient collects all partial derivatives into a single vector. For a function рқ‘“ : рқ‘… рқ‘ӣ вҶ’ рқ‘… f:R n вҶ’R: вҲҮ рқ‘“ = [ вҲӮ рқ‘“ вҲӮ рқ‘Ҙ 1 вҲӮ рқ‘“ вҲӮ рқ‘Ҙ 2 вӢ® вҲӮ рқ‘“ вҲӮ рқ‘Ҙ рқ‘ӣ ] вҲҮf= вҖӢ вҲӮx 1 вҖӢ вҲӮf вҖӢ вҲӮx 2 вҖӢ вҲӮf вҖӢ вӢ® вҲӮx n вҖӢ вҲӮf вҖӢ вҖӢ вҖӢ The symbol вҲҮ вҲҮ is called \"nabla\" or \"del\". Direction of Steepest Ascent The gradient вҲҮ рқ‘“ вҲҮf points in the direction where f increases fastest. If you're standing on a hill, the gradient points uphill. Gradient Descent To minimize f (like a loss function), move in the opposite direction: рқңғ рқ‘ӣ рқ‘’ рқ‘Ө = рқңғ рқ‘ң рқ‘ҷ рқ‘‘ вҲ’ рқӣј вҲҮ рқ‘“ Оё new вҖӢ =Оё old вҖӢ вҲ’ОұвҲҮf Magnitude = Steepness The magnitude вҲЈ вҲЈ вҲҮ рқ‘“ вҲЈ вҲЈ вҲЈвҲЈвҲҮfвҲЈвҲЈ tells you how steep the slope is. Large gradient = steep terrain = big updates. Interactive: The Gradient For the function рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = рқ‘Ҙ 2 + рқ‘Ұ 2 f(x,y)=x 2 +y 2 , the gradient is: вҲҮ рқ‘“ = [ вҲӮ рқ‘“ вҲӮ рқ‘Ҙ вҲӮ рқ‘“ вҲӮ рқ‘Ұ ] = [ 2 рқ‘Ҙ 2 рқ‘Ұ ] вҲҮf=[ вҲӮx вҲӮf вҖӢ вҲӮy вҲӮf вҖӢ вҖӢ ]=[ 2x 2y вҖӢ ] Drag the point to see how the gradient always points toward steepest ascent (away from the minimum at the origin). Interactive Gradient f(x, y) = xВІ + yВІ вҲҮ рқ‘“ = вҹЁ 2 рқ‘Ҙ , 2 рқ‘Ұ вҹ© вҲҮf=вҹЁ2x,2yвҹ© min Click & Drag anywhere Partials = Components вҲӮ рқ‘“ вҲӮ рқ‘Ҙ = 2 рқ‘Ҙ вҲӮx вҲӮf вҖӢ =2x Horizontal Slope 2.00 вҲӮ рқ‘“ вҲӮ рқ‘Ұ = 2 рқ‘Ұ вҲӮy вҲӮf вҖӢ =2y Vertical Slope 2.00 GRADIENT CONSTRUCTION вҲҮ рқ‘“ = вҹЁ 2.00 , 2.00 вҹ© вҲҮf=вҹЁ2.00,2.00вҹ© The gradient vector is literally just the list of partial derivatives. Magnitude (Steepness): 2.83 Direction: 45В° Notice how the gradient always points perpendicular to the contour lines? Directional Derivatives Partial derivatives tell us the slope along c", "url": "https://www.tensortonic.com/ml-math/calculus/partial-derivatives?problem=gradient-computation", "template": "// Numerical gradient: вҲӮf/вҲӮxi вүҲ [f(x+h*ei) - f(x-h*ei)] / 2h\n// Each thread computes gradient for one dimension\n#include <cuda_runtime.h>\n\n__device__ float f(const float* x, int n) {\n    // TODO: replace with your target function\n    float s = 0;\n    for (int i = 0; i < n; i++) s += x[i] * x[i];\n    return s;  // example: f(x) = sum(x_iВІ), grad = 2x\n}\n\n__global__ void numerical_gradient(const float* x, float* grad, int n, float h) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n\n    // Copy x to local (can't modify global for other threads)\n    // For real use: allocate per-thread local copy\n    float xi_orig = x[i];\n    // central difference needs f(x+h) and f(x-h)\n    // TODO: implement with device-side local copies\n    grad[i] = 2.0f * xi_orig;  // placeholder for f(x)=sum(xВІ)\n}\n"}, "l1-l2-regularization": {"slug": "l1-l2-regularization", "title": "Regularization (L1, L2, Dropout)", "section": "Optimization", "topic": "Regularization", "description": "Introduction A deep neural network with millions of parameters is a \"universal function approximator.\" It can memorize every single pixel of your training data. With a powerful enough model and cross-entropy loss, the model fits the training set perfectly. This is a problem. When a model memorizes training data instead of learning general patterns, it fails catastrophically on new, unseen data. This is overfitting, and understanding loss landscapes helps explain why it happens. Regularization intentionally constrains the model's capacity. We force it to be \"simpler,\" which paradoxically makes it generalize better. It's like training with handicaps so you perform better in the real competition. Bias-Variance Tradeoff Every ML model's error can be decomposed into three parts: Error = Bias 2 + Variance + Irreducible Noise Error=Bias 2 +Variance+Irreducible Noise High Bias (Underfitting) Model is too simple. Can't capture the true pattern. Example: Fitting a line to parabolic data. High Variance (Overfitting) Model is too complex. Fits noise in training data. Example: 20-degree polynomial through 10 points. Regularization increases bias slightly but dramatically reduces variance. The tradeoff is usually worth it. L2 Regularization (Ridge) L2 regularization adds the sum of squared weights to the loss function. During gradient descent, this penalizes large weights: рқҗҝ total = рқҗҝ data + рқңҶ вҲ‘ рқ‘– рқ‘Ө рқ‘– 2 L total вҖӢ =L data вҖӢ +О»вҲ‘ i вҖӢ w i 2 вҖӢ Gradient Update with L2 The gradient of the penalty is 2 рқңҶ рқ‘Ө 2О»w: рқ‘Ө рқ‘ӣ рқ‘’ рқ‘Ө = рқ‘Ө вҲ’ рқңӮ ( вҲҮ рқҗҝ + 2 рқңҶ рқ‘Ө ) w new вҖӢ =wвҲ’О·(вҲҮL+2О»w) рқ‘Ө рқ‘ӣ рқ‘’ рқ‘Ө = рқ‘Ө ( 1 вҲ’ 2 рқңӮ рқңҶ ) вҲ’ рқңӮ вҲҮ рқҗҝ w new вҖӢ =w(1вҲ’2О·О»)вҲ’О·вҲҮL This is called Weight Decay. Every step, weights are multiplied by a factor slightly less than 1. See AdamW for why decoupling weight decay matters. L2's Effect L2 penalizes large weights quadratically. A weight of 10 is penalized 100x more than a weight of 1. Result: Weights are pushed toward zero but rarely reach exactly zero. All features contribute, just with smaller coefficients. The L2 penalty is also convex, making optimization tractable. L1 Regularization (Lasso) L1 regularization adds the sum of absolute weights: рқҗҝ total = рқҗҝ data + рқңҶ вҲ‘ рқ‘– вҲЈ рқ‘Ө рқ‘– вҲЈ L total вҖӢ =L data вҖӢ +О»вҲ‘ i вҖӢ вҲЈw i вҖӢ вҲЈ Gradient Update with L1 The gradient of вҲЈ рқ‘Ө вҲЈ вҲЈwвҲЈ is sign ( рқ‘Ө ) sign(w) (either +1 or -1): рқ‘Ө рқ‘ӣ рқ‘’ рқ‘Ө = рқ‘Ө вҲ’ рқңӮ ( вҲҮ рқҗҝ + рқңҶ вӢ… sign ( рқ‘Ө ) ) w new вҖӢ =wвҲ’О·(вҲҮL+О»вӢ…sign(w)) The penalty subtracts a constant from the weight magnitude at each step, regardless of the weight's current value. L1's Effect: Sparsity Unlike L2, L1 pushes weights all the way to exactly zero. This produces sparse models where many features are completely ignored. L1 effectively performs feature selection, similar in spirit to how Information Gain selects features in decision trees. Geometric Intuition The magic of L1 sparsity comes from geometry. Think of regularization as constraining weights to lie within a region. This is closely related to constrained optimization. L1: The Diamond вҲЈ рқ‘Ө 1 вҲЈ + вҲЈ рқ‘Ө 2 вҲЈ вүӨ рқҗ¶ вҲЈw 1 вҖӢ вҲЈ+вҲЈw 2 вҖӢ вҲЈвүӨC Sharp corners on the axes. Loss contours likely hit a corner first, zeroing one weight. L2: The Circle рқ‘Ө 1 2 + рқ‘Ө 2 2 вүӨ рқҗ¶ w 1 2 вҖӢ +w 2 2 вҖӢ вүӨC No corners. Loss contours hit a smooth edge. Both weights stay non-zero. Interactive: L1 vs L2 Geometry Watch how the loss contours intersect the constraint regions. L1's corners naturally produce zeros. L1 (Diamond) vs L2 (Circle) Geometry The constraint region shape determines where the loss contours first touch. L1 (Lasso) L2 (Ridge) Constraint budget: 1.2 Unconstrained Min w1 w2 L2: Circle = Distributed Weights The loss contours (orange/green ellipses) hit the circle at an arbitrary point on the edge. Both weights are small but non-zero. L2 shrinks weights uniformly without zeroing them out. w1 1.157 w2 0.320 Elastic Net Why choose? Elastic Net combines both: рқҗҝ = рқҗҝ рқ‘‘ рқ‘Һ рқ‘Ў рқ‘Һ + рқңҶ 1 вҲ‘ вҲЈ рқ‘Ө рқ‘– вҲЈ + рқңҶ 2 вҲ‘ рқ‘Ө рқ‘– 2 L=L data вҖӢ +О» 1 вҖӢ вҲ‘вҲЈw i вҖӢ вҲЈ+О» 2 вҖӢ вҲ‘w i 2 вҖӢ Elastic Net gets L1's feature selection while avoiding its instability when featur", "url": "https://www.tensortonic.com/ml-math/optimization/regularization?problem=l1-l2-regularization", "template": "// L1 reg: loss += О» * ОЈ|Оё_i|    grad += О» * sign(Оё_i)\n// L2 reg: loss += О»/2 * ОЈОё_iВІ  grad += О» * Оё_i\n#include <cuda_runtime.h>\n\n__global__ void add_l2_grad(float* grads, const float* params,\n                             float lambda, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n) grads[i] += lambda * params[i];\n}\n\n__global__ void add_l1_grad(float* grads, const float* params,\n                             float lambda, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n) {\n        float sign = (params[i] > 0) ? 1.0f : (params[i] < 0) ? -1.0f : 0.0f;\n        grads[i] += lambda * sign;\n    }\n}\n\n__global__ void l2_penalty(const float* params, float* loss_term,\n                            float lambda, int n) {\n    // Parallel reduction: sum params[i]ВІ\n    __shared__ float smem[256];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n    smem[tid] = (i < n) ? params[i] * params[i] : 0.0f;\n    __syncthreads();\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) loss_term[blockIdx.x] = 0.5f * lambda * smem[0];\n}\n"}, "hessian-computation": {"slug": "hessian-computation", "title": "Jacobian & Hessian Matrices", "section": "Calculus", "topic": "Hessian", "description": "Introduction In single-variable calculus, we have f'(x) (first derivative/slope) and f''(x) (second derivative/curvature). But neural networks operate on vectors with millions of dimensions. When we generalize derivatives to vectors: Jacobian (First Order) Matrix of all first partial derivatives. Generalizes gradient to vector-valued functions. Hessian (Second Order) Matrix of all second partial derivatives. Captures curvature information. The Derivative Hierarchy The type of derivative depends on the input and output dimensions: Input Output Derivative Shape Scalar (x) Scalar (y) Derivative 1 x 1 Vector (x) Scalar (y) Gradient n x 1 Vector (x) Vector (y) Jacobian m x n Vector (x) Scalar (y) Hessian (2nd) n x n The Jacobian Matrix For a function рқ‘“ : рқ‘… рқ‘ӣ вҶ’ рқ‘… рқ‘ҡ f:R n вҶ’R m (n inputs, m outputs), the Jacobian is an m x n matrix: рқҗҪ = [ вҲӮ рқ‘“ 1 вҲӮ рқ‘Ҙ 1 вҲӮ рқ‘“ 1 вҲӮ рқ‘Ҙ 2 вӢҜ вҲӮ рқ‘“ 1 вҲӮ рқ‘Ҙ рқ‘ӣ вҲӮ рқ‘“ 2 вҲӮ рқ‘Ҙ 1 вҲӮ рқ‘“ 2 вҲӮ рқ‘Ҙ 2 вӢҜ вҲӮ рқ‘“ 2 вҲӮ рқ‘Ҙ рқ‘ӣ вӢ® вӢ® вӢұ вӢ® вҲӮ рқ‘“ рқ‘ҡ вҲӮ рқ‘Ҙ 1 вҲӮ рқ‘“ рқ‘ҡ вҲӮ рқ‘Ҙ 2 вӢҜ вҲӮ рқ‘“ рқ‘ҡ вҲӮ рқ‘Ҙ рқ‘ӣ ] J= вҖӢ вҲӮx 1 вҖӢ вҲӮf 1 вҖӢ вҖӢ вҲӮx 1 вҖӢ вҲӮf 2 вҖӢ вҖӢ вӢ® вҲӮx 1 вҖӢ вҲӮf m вҖӢ вҖӢ вҖӢ вҲӮx 2 вҖӢ вҲӮf 1 вҖӢ вҖӢ вҲӮx 2 вҖӢ вҲӮf 2 вҖӢ вҖӢ вӢ® вҲӮx 2 вҖӢ вҲӮf m вҖӢ вҖӢ вҖӢ вӢҜ вӢҜ вӢұ вӢҜ вҖӢ вҲӮx n вҖӢ вҲӮf 1 вҖӢ вҖӢ вҲӮx n вҖӢ вҲӮf 2 вҖӢ вҖӢ вӢ® вҲӮx n вҖӢ вҲӮf m вҖӢ вҖӢ вҖӢ вҖӢ Row i = how output i changes with each input. Column j = how each output changes with input j. Geometric Meaning The Jacobian represents the best linear approximation to f near a point. It tells us how a small change in input рқӣҝ рқ‘Ҙ Оҙx affects the output: рқ‘“ ( рқ‘Ҙ + рқӣҝ рқ‘Ҙ ) вүҲ рқ‘“ ( рқ‘Ҙ ) + рқҗҪ вӢ… рқӣҝ рқ‘Ҙ f(x+Оҙx)вүҲf(x)+JвӢ…Оҙx Jacobian: Worked Example Consider a function from рқ‘… 2 вҶ’ рқ‘… 2 R 2 вҶ’R 2 : рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = [ рқ‘Ҙ 2 + рқ‘Ұ рқ‘Ҙ рқ‘Ұ ] f(x,y)=[ x 2 +y xy вҖӢ ] Step 1: Compute all partial derivatives вҲӮ рқ‘“ 1 вҲӮ рқ‘Ҙ = 2 рқ‘Ҙ вҲӮx вҲӮf 1 вҖӢ вҖӢ =2x вҲӮ рқ‘“ 1 вҲӮ рқ‘Ұ = 1 вҲӮy вҲӮf 1 вҖӢ вҖӢ =1 вҲӮ рқ‘“ 2 вҲӮ рқ‘Ҙ = рқ‘Ұ вҲӮx вҲӮf 2 вҖӢ вҖӢ =y вҲӮ рқ‘“ 2 вҲӮ рқ‘Ұ = рқ‘Ҙ вҲӮy вҲӮf 2 вҖӢ вҖӢ =x Step 2: Assemble the Jacobian рқҗҪ = [ 2 рқ‘Ҙ 1 рқ‘Ұ рқ‘Ҙ ] J=[ 2x y вҖӢ 1 x вҖӢ ] Step 3: Evaluate at a point (x=2, y=3) рқҗҪ вҲЈ ( 2 , 3 ) = [ 4 1 3 2 ] JвҲЈ (2,3) вҖӢ =[ 4 3 вҖӢ 1 2 вҖӢ ] Interactive: Jacobian in Action See how the Jacobian provides a linear approximation to how outputs change with inputs. Move the base point and perturbation to explore. Jacobian Linearization рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = ( рқ‘Ҙ 2 + рқ‘Ұ , рқ‘Ҙ рқ‘Ұ ) f(x,y)=(x 2 +y,xy). Drag the points to explore. Local Grid Reset INPUT SPACE (X, Y) Base: (1.50, 1.00) Perturbation рқӣҝ Оҙ: (0.50, 0.30) OUTPUT SPACE (U, V) APPROXIMATION ERROR 0.2915 Jacobian J at Base [ 3.00 1.00 1.00 1.50 ] [ 3.00 1.00 вҖӢ 1.00 1.50 вҖӢ ] True Change Linear Approx The Hessian Matrix For a scalar-valued function рқ‘“ : рқ‘… рқ‘ӣ вҶ’ рқ‘… f:R n вҶ’R (like a loss function), the Hessian is the n x n matrix of second-order partial derivatives: рқҗ» = вҲҮ 2 рқ‘“ = [ вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ 1 2 вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ 1 вҲӮ рқ‘Ҙ 2 вӢҜ вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ 2 вҲӮ рқ‘Ҙ 1 вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ 2 2 вӢҜ вӢ® вӢ® вӢұ ] H=вҲҮ 2 f= вҖӢ вҲӮx 1 2 вҖӢ вҲӮ 2 f вҖӢ вҲӮx 2 вҖӢ вҲӮx 1 вҖӢ вҲӮ 2 f вҖӢ вӢ® вҖӢ вҲӮx 1 вҖӢ вҲӮx 2 вҖӢ вҲӮ 2 f вҖӢ вҲӮx 2 2 вҖӢ вҲӮ 2 f вҖӢ вӢ® вҖӢ вӢҜ вӢҜ вӢұ вҖӢ вҖӢ Symmetric For continuous second partials: вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ рқ‘– вҲӮ рқ‘Ҙ рқ‘— = вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ рқ‘— вҲӮ рқ‘Ҙ рқ‘– вҲӮx i вҖӢ вҲӮx j вҖӢ вҲӮ 2 f вҖӢ = вҲӮx j вҖӢ вҲӮx i вҖӢ вҲӮ 2 f вҖӢ So рқҗ» = рқҗ» рқ‘Ү H=H T Curvature The Hessian captures how the gradient itself changes. It describes the \"bowl shape\" of the function. Hessian: Worked Example Consider a loss function рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = рқ‘Ҙ 2 + 3 рқ‘Ҙ рқ‘Ұ + рқ‘Ұ 2 f(x,y)=x 2 +3xy+y 2 : Step 1: First partial derivatives (gradient) вҲҮ рқ‘“ = [ 2 рқ‘Ҙ + 3 рқ‘Ұ 3 рқ‘Ҙ + 2 рқ‘Ұ ] вҲҮf=[ 2x+3y 3x+2y вҖӢ ] Step 2: Second partial derivatives вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ 2 = 2 вҲӮx 2 вҲӮ 2 f вҖӢ =2 вҲӮ 2 рқ‘“ вҲӮ рқ‘Ҙ вҲӮ рқ‘Ұ = 3 вҲӮxвҲӮy вҲӮ 2 f вҖӢ =3 вҲӮ 2 рқ‘“ вҲӮ рқ‘Ұ вҲӮ рқ‘Ҙ = 3 вҲӮyвҲӮx вҲӮ 2 f вҖӢ =3 вҲӮ 2 рқ‘“ вҲӮ рқ‘Ұ 2 = 2 вҲӮy 2 вҲӮ 2 f вҖӢ =2 Step 3: Assemble Hessian рқҗ» = [ 2 3 3 2 ] H=[ 2 3 вҖӢ 3 2 вҖӢ ] Note: constant because f is quadratic. Interactive: Curvature & Critical Points Adjust the Hessian eigenvalues to see how they determine the shape of the loss surface and classify critical points. Hessian Curvature & Step Size High curvature = Steep walls = Inverse Hessian prevents overshooting. Gradient Descent Newton's Method Newton (Direct) GD (Fixed LR) FLAT (LOW CURVATURE) STEEP (HIGH CURVATURE) Hessian рқ‘“ вҖІ вҖІ ( рқ‘Ҙ ) = 2.0 f вҖІвҖІ (x)=2.0 STEP SIZE ANALYSIS Newton Step О” рқ‘Ҙ = вҲ’ рқ‘“ вҖІ / рқ‘“ вҖІ вҖІ О”x=вҲ’f вҖІ /f вҖІвҖІ Adapts to curvature. If curve is steep (high рқ‘“ вҖІ вҖІ f вҖІвҖІ ), ste", "url": "https://www.tensortonic.com/ml-math/calculus/jacobian-hessian?problem=hessian-computation", "template": "// Hessian diagonal: H_ii вүҲ [f(x+h*ei) - 2f(x) + f(x-h*ei)] / hВІ\n// Off-diagonal: H_ij вүҲ [f(x+h*ei+h*ej) - f(x+h*ei) - f(x+h*ej) + f(x)] / hВІ\n#include <cuda_runtime.h>\n\n__global__ void hessian_diagonal(const float* x, float f0, float* diag,\n                                   int n, float h) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n    // diag[i] = (f(x+h*ei) - 2*f0 + f(x-h*ei)) / hВІ\n    // TODO: evaluate f at perturbed points (requires device function for f)\n    diag[i] = 0.0f;  // placeholder\n}\n"}, "vector-norms": {"slug": "vector-norms", "title": "Dot Product & Vector Norms", "section": "Linear Algebra", "topic": "Vector Norms", "description": "Introduction At the heart are two fundamental operations: Dot Product (alignment) and Norms (magnitude). Every neural network prediction, recommender system suggestion, and regularization penalty uses these operations. Together, they form the foundation of how machines understand similarity, distance, and direction in high-dimensional space. Why These Matter Understanding dot products and norms is crucial for modern ML architectures. Matrix multiplication is just batched dot products. Transformer attention computes similarity via scaled dot products. Regularization techniques like Ridge and Lasso use different norms to constrain model complexity. The Dot Product The dot product (also called inner product or scalar product) takes two vectors of equal length and returns a single scalar. It is the most fundamental operation in linear algebra. рқ‘Һ вӢ… рқ‘Ҹ = вҲ‘ рқ‘– = 1 рқ‘ӣ рқ‘Һ рқ‘– рқ‘Ҹ рқ‘– aвӢ…b=вҲ‘ i=1 n вҖӢ a i вҖӢ b i вҖӢ Multiply corresponding elements, then sum. Algorithm a = [1, 3] b = [4, -2] a В· b = (1)(4) + (3)(-2) = -2 Matrix Notation рқ‘Һ рқ‘Ү рқ‘Ҹ a T b Row vector Г— Column vector. This generalizes to specific rows and columns in larger matrices. Geometric Interpretation The dot product measures alignment between vectors. It bridges algebra and geometry. рқ‘Һ вӢ… рқ‘Ҹ = вҲЈ вҲЈ рқ‘Һ вҲЈ вҲЈ вӢ… вҲЈ вҲЈ рқ‘Ҹ вҲЈ вҲЈ cos вҒЎ ( рқңғ ) aвӢ…b=вҲЈвҲЈaвҲЈвҲЈвӢ…вҲЈвҲЈbвҲЈвҲЈcos(Оё) Product of magnitudes times the cosine of the angle between them. Positive Vectors point in roughly the same direction ( рқңғ < 90 В° Оё<90В°). Zero Vectors are orthogonal (perpendicular) ( рқңғ = 90 В° Оё=90В°). Negative Vectors point in opposite directions ( рқңғ > 90 В° Оё>90В°). The Projection View Think of it as casting a shadow of vector a onto b. The dot product tells you: \"How much of a goes in the direction of b?\". This \"projection\" concept is why dot products measure similarity. Properties of the Dot Product Commutative рқ‘Һ вӢ… рқ‘Ҹ = рқ‘Ҹ вӢ… рқ‘Һ aвӢ…b=bвӢ…a Order does not matter. Distributive рқ‘Һ вӢ… ( рқ‘Ҹ + рқ‘җ ) = рқ‘Һ вӢ… рқ‘Ҹ + рқ‘Һ вӢ… рқ‘җ aвӢ…(b+c)=aвӢ…b+aвӢ…c Distributes over vector addition. Self Dot Product рқ‘Һ вӢ… рқ‘Һ = вҲЈ вҲЈ рқ‘Һ вҲЈ вҲЈ 2 aвӢ…a=вҲЈвҲЈaвҲЈвҲЈ 2 Dotting a vector with itself gives the squared norm (magnitude). Interactive: Dot Product Drag the sliders to change vectors. See how the dot product relates to angle, cosine, and projection. DOT PRODUCT a b 45В° 6.4 a В· b FUSION Lock Tilt Cross Split |a| 3 |b| 3 Оё 45В° Vector Norms A norm measures the \"size\" or \"magnitude\" of a vector. Different norms measure size in different ways, each with unique geometric interpretations and ML applications. L2 Norm (Euclidean) вҲЈ вҲЈ рқ‘Ҙ вҲЈ вҲЈ 2 = вҲ‘ рқ‘Ҙ рқ‘– 2 вҲЈвҲЈxвҲЈвҲЈ 2 вҖӢ = вҲ‘x i 2 вҖӢ вҖӢ Straight-line distance. Used in Ridge Regression, KNN. L1 Norm (Manhattan) вҲЈ вҲЈ рқ‘Ҙ вҲЈ вҲЈ 1 = вҲ‘ вҲЈ рқ‘Ҙ рқ‘– вҲЈ вҲЈвҲЈxвҲЈвҲЈ 1 вҖӢ =вҲ‘вҲЈx i вҖӢ вҲЈ Sum of absolute values (taxi-cab distance). Promotes sparsity (Lasso). L-infinity Norm (Max) вҲЈ вҲЈ рқ‘Ҙ вҲЈ вҲЈ вҲһ = max вҒЎ вҲЈ рқ‘Ҙ рқ‘– вҲЈ вҲЈвҲЈxвҲЈвҲЈ вҲһ вҖӢ =maxвҲЈx i вҖӢ вҲЈ Largest single element. Used in adversarial robustness. Properties of Norms For a function to be a valid norm, it must satisfy three axioms: Non-negativity: Norm is always non-negative. Zero only if the vector is zero. Absolute Homogeneity: Scaling the vector scales the norm by the absolute scalar value. Triangle Inequality: The direct path is always shorter than any detour. вҲЈ вҲЈ рқ‘Ҙ + рқ‘Ұ вҲЈ вҲЈ вүӨ вҲЈ вҲЈ рқ‘Ҙ вҲЈ вҲЈ + вҲЈ вҲЈ рқ‘Ұ вҲЈ вҲЈ вҲЈвҲЈx+yвҲЈвҲЈвүӨвҲЈвҲЈxвҲЈвҲЈ+вҲЈвҲЈyвҲЈвҲЈ The p-Norm Family All common norms are special cases of the generalized p-norm (where рқ‘қ вүҘ 1 pвүҘ1). вҲЈ вҲЈ рқ‘Ҙ вҲЈ вҲЈ рқ‘қ = ( вҲ‘ рқ‘– = 1 рқ‘ӣ вҲЈ рқ‘Ҙ рқ‘– вҲЈ рқ‘қ ) 1 / рқ‘қ вҲЈвҲЈxвҲЈвҲЈ p вҖӢ =(вҲ‘ i=1 n вҖӢ вҲЈx i вҖӢ вҲЈ p ) 1/p рқ‘қ = 1 p=1 L1 Norm (Manhattan) рқ‘қ = 2 p=2 L2 Norm (Euclidean) рқ‘қ = 3 , 4 , вҖҰ p=3,4,вҖҰ Higher-order norms рқ‘қ вҶ’ вҲһ pвҶ’вҲһ L-infinity (Max) Interactive: Unit Balls The \"unit ball\" (vectors with norm = 1) has a different shape for each p-norm. This shape explains why L1 regularization promotes sparsity (sharp corners on axes). Vector Norms & Unit Balls Visualizing вҲҘ рқ‘Ҙ вҲҘ рқ‘қ = 1 вҲҘxвҲҘ p вҖӢ =1 for different p-norms. SELECT NORM L1 L2 LвҲһ VECTOR COMPONENTS X Coordinate 3 Y Coordinate 4 L2 Norm (Euclidean) Points with constant sum of squares form a circle. Measures straight-line distance. Unit Ball (Norm=1) Gr", "url": "https://www.tensortonic.com/ml-math/linear-algebra/dot-norm?problem=vector-norms", "template": "// L1 norm = ОЈ |x_i|\n// L2 norm = sqrt(ОЈ x_iВІ)\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n\n__global__ void norm_l1(const float* x, float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n    smem[tid] = (i < n) ? fabsf(x[i]) : 0.0f;\n    __syncthreads();\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid + s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n\n__global__ void norm_l2_sq(const float* x, float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n    smem[tid] = (i < n) ? x[i] * x[i] : 0.0f;\n    __syncthreads();\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid + s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n// L2 = sqrtf(sum_of_squares)\n"}, "shannon-entropy": {"slug": "shannon-entropy", "title": "Shannon Entropy", "section": "Info Theory", "topic": "Shannon Entropy", "description": "Introduction In 1948, Claude Shannon published \"A Mathematical Theory of Communication,\" creating the field of Information Theory. He asked a deceptively simple question: \"How do we measure information?\" Before Shannon, \"information\" was vague and philosophical. After Shannon, information became a precise, measurable quantity, as fundamental as mass or energy. This single insight underlies everything from data compression (ZIP files) to neural networks (Cross-Entropy loss). Shannon's Key Insight Information is the resolution of uncertainty. If you already knew something with certainty, telling you provides zero information. If you didn't know it at all, telling you provides maximum information. Intuition: Measuring Surprise Think of information as surprise. Unlikely events are surprising; likely events are not. Low Information (No Surprise) \"The sun rose this morning.\" P(sun rises) = 1.0. You knew this would happen. The message tells you nothing you didn't already know. High Information (Surprising) \"It snowed in the Sahara Desert today.\" P(Sahara snow) = 0.0001. This is shocking! The message carries enormous information. \"Information is inversely proportional to probability.\" Bits: The Unit of Information Shannon defined the unit of information as the bit (binary digit). One bit is the amount of information gained from learning the outcome of a fair coin flip. How Many Bits? 1 bit 2 equally likely outcomes (coin flip) 2 bits 4 outcomes (00, 01, 10, 11) 3 bits 8 outcomes (2^3) Bits needed = log вҒЎ 2 ( Number of equally likely outcomes ) Bits needed=log 2 вҖӢ (Number of equally likely outcomes) To identify one person among 8 billion, you need log вҒЎ 2 ( 8 Г— 10 9 ) вүҲ 33 log 2 вҖӢ (8Г—10 9 )вүҲ33 bits. That's 33 yes/no questions. Information Content (Surprisal) If an event рқ‘Ҙ x has probability рқ‘ғ ( рқ‘Ҙ ) P(x), its information content (also called \"surprisal\" or \"self-information\") is: рқҗј ( рқ‘Ҙ ) = вҲ’ log вҒЎ 2 рқ‘ғ ( рқ‘Ҙ ) = log вҒЎ 2 1 рқ‘ғ ( рқ‘Ҙ ) I(x)=вҲ’log 2 вҖӢ P(x)=log 2 вҖӢ P(x) 1 вҖӢ Measured in bits when using log вҒЎ 2 log 2 вҖӢ . Use ln вҒЎ ln for \"nats\" (natural units). Why Logarithm? Information is additive. Two independent coin flips provide 1 + 1 = 2 1+1=2 bits of information. Probabilities multiply ( 0.5 Г— 0.5 = 0.25 0.5Г—0.5=0.25). Logarithms turn multiplication into addition: log вҒЎ ( рқ‘ғ 1 вӢ… рқ‘ғ 2 ) = log вҒЎ ( рқ‘ғ 1 ) + log вҒЎ ( рқ‘ғ 2 ) log(P 1 вҖӢ вӢ…P 2 вҖӢ )=log(P 1 вҖӢ )+log(P 2 вҖӢ ) P(x) = 1.0 I(x) = 0 bits Certainty: No surprise P(x) = 0.5 I(x) = 1 bit Fair coin flip P(x) = 0.001 I(x) = 9.97 bits Rare event: Very surprising Interactive: Information Content Explore the inverse relationship between probability and information. Drag the slider to see how rare events carry more information! Information Content Visualization See how information content I(x) = -logвӮӮ(P(x)) changes with probability. Rare events carry more information! Probability: 0.500 0.01 (Very Rare) 0.5 (Fair) 1.0 (Certain) Probability P(x) Information I(x) (bits) 0.00 0.25 0.50 0.75 1.00 0 2 4 6 8 10 1.00 bits Probability 0.500 Information Content 1.00 bits Interpretation Moderate Key Observations As probability approaches 0, information content goes to infinity (very surprising events) When P(x) = 1.0, I(x) = 0 (certain events carry no information) When P(x) = 0.5, I(x) = 1 bit (a fair coin flip) The relationship is logarithmic: information adds when probabilities multiply Entropy: The Expected Surprise рқҗј ( рқ‘Ҙ ) I(x) is the information for a single specific event. Entropy рқҗ» H is the average information content of the entire probability distribution. It tells us how \"unpredictable\" the source is on average. рқҗ» ( рқ‘Ӣ ) = рқҗё [ рқҗј ( рқ‘Ӣ ) ] = вҲ’ вҲ‘ рқ‘Ҙ рқ‘ғ ( рқ‘Ҙ ) log вҒЎ 2 рқ‘ғ ( рқ‘Ҙ ) H(X)=E[I(X)]=вҲ’вҲ‘ x вҖӢ P(x)log 2 вҖӢ P(x) Entropy is the expected value of information content. Low Entropy (Predictable) Biased coin: P(H) = 0.99, P(T) = 0.01 H = 0.08 bits. The outcome is almost certain. High Entropy (Uncertain) Fair coin: P(H) = 0.5, P(T) = 0.5 H = 1.0 bit. Maximum uncertainty for 2 outcomes. Interactive: Binary Entropy Explore how e", "url": "https://www.tensortonic.com/ml-math/information-theory/shannon-entropy?problem=shannon-entropy", "template": "// Shannon Entropy: H(X) = -ОЈ p_i * log2(p_i)\n// Parallel reduction: each thread computes p_i * log2(p_i)\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n#define LOG2E 1.4426950408f  // 1/ln(2)\n\n__global__ void entropy_reduce(const float* probs, float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    float p = (i < n && probs[i] > 0) ? probs[i] : 0.0f;\n    smem[tid] = (p > 0) ? -p * logf(p) * LOG2E : 0.0f;\n    __syncthreads();\n\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n// H(X) = sum of all partial results\n"}, "bayes-theorem": {"slug": "bayes-theorem", "title": "Bayes' Theorem & Inference", "section": "Probability", "topic": "Bayes Theorem", "description": "Introduction In everyday logic, we think cause to effect: \"If it rains, the grass gets wet.\" But in reality, we often observe the effect and must infer the cause: \"The grass is wet. Did it rain, or did the sprinklers turn on?\" Bayes' Theorem tells us how to reverse conditional probabilities. Given рқ‘ғ ( effect вҲЈ cause ) P(effectвҲЈcause), compute рқ‘ғ ( cause вҲЈ effect ) P(causeвҲЈeffect). This is the foundation of Bayesian Inference: treating learning as the continuous process of updating probability distributions as new data arrives. It is arguably the most important theorem in machine learning. The Core Intuition Prior + Evidence = Posterior Prior Initial belief before seeing data Likelihood How compatible is data with hypothesis? Posterior Updated belief after seeing data Example: Is My Friend Home? Prior: 50% chance she is home (no idea initially). Evidence: Lights are on. Likelihood: If home, 90% chance lights are on. If not home, 10% chance lights are on. Posterior: After seeing lights on, P(home | lights on) = ? Bayes tells us: 90%. The evidence dramatically shifted our belief. The Formula рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) = рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) рқ‘ғ ( рқҗө ) P(AвҲЈB)= P(B) P(BвҲЈA)вӢ…P(A) вҖӢ Posterior P(A|B) What we want Likelihood P(B|A) Data fit Prior P(A) Initial belief Evidence P(B) Normalizer Proportional Form рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) вҲқ рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) P(AвҲЈB)вҲқP(BвҲЈA)вӢ…P(A) Often we skip рқ‘ғ ( рқҗө ) P(B) and just normalize at the end. Odds Form рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) рқ‘ғ ( В¬ рқҗҙ вҲЈ рқҗө ) = рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) рқ‘ғ ( рқҗө вҲЈ В¬ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) рқ‘ғ ( В¬ рқҗҙ ) P(В¬AвҲЈB) P(AвҲЈB) вҖӢ = P(BвҲЈВ¬A) P(BвҲЈA) вҖӢ вӢ… P(В¬A) P(A) вҖӢ Posterior odds = Likelihood ratio x Prior odds Interactive: Bayes Calculator Adjust prior and likelihood to see how the posterior changes. Notice how strong priors resist change, and how strong evidence can overcome weak priors. PRIOR P(A) 1.0% Prevalence: How rare is the event? SENSITIVITY P(B|A) 99.0% True Positive Rate: Ability to detect true cases. FALSE POSITIVE RATE P(B|В¬A) 5.0% False Alarm Rate: Healthy people testing positive. True Pos (0.99%) Hypothesis True False Pos (4.95%) Hypothesis False Positive Tests (Colored Area) Geometric Intuition: The Posterior P(A|B) is the fraction of total colored area (Positives) that is Green (True). BAYES EQUATION 99.0% Г— 1.0% (99% Г— 1.0%) + (5.0% Г— 99.0%) Posterior P(A|B) 16.7% Even with 99% Sensitivity, if the Prior is very low (e.g. 1%) and False Positive Rate is even moderate (5%), the Posterior drops to ~16%! Most \"positive\" tests for rare diseases are actually false alarms. This is the False Positive Paradox. Derivation Bayes' Theorem is not a new axiom. It follows directly from the definition of conditional probability and the product rule. 1. Product rule (two ways): рқ‘ғ ( рқҗҙ вҲ© рқҗө ) = рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) вӢ… рқ‘ғ ( рқҗө ) = рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) P(AвҲ©B)=P(AвҲЈB)вӢ…P(B)=P(BвҲЈA)вӢ…P(A) 2. Set them equal: рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) вӢ… рқ‘ғ ( рқҗө ) = рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) P(AвҲЈB)вӢ…P(B)=P(BвҲЈA)вӢ…P(A) 3. Divide by P(B): рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) = рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗҙ ) рқ‘ғ ( рқҗө ) P(AвҲЈB)= P(B) P(BвҲЈA)вӢ…P(A) вҖӢ See Conditional Probability for background on рқ‘ғ ( рқҗҙ вҲЈ рқҗө ) P(AвҲЈB). The False Positive Paradox This classic example reveals why humans are notoriously bad at intuitive probability. The Setup 1% of population has the disease (Prior = 0.01) Test is 99% accurate for sick people (Sensitivity = 0.99) Test has 1% false positive rate for healthy people You test positive. What is P(Disease | Positive)? Most people guess 99%. They are wrong. Step 1: Numerator (True Positives) рқ‘ғ ( + вҲЈ рқҗ· ) Г— рқ‘ғ ( рқҗ· ) = 0.99 Г— 0.01 = P(+вҲЈD)Г—P(D)=0.99Г—0.01=0.0099 Step 2: Denominator (All Positives) рқ‘ғ ( + ) = рқ‘ғ ( + вҲЈ рқҗ· ) рқ‘ғ ( рқҗ· ) + рқ‘ғ ( + вҲЈ рқҗ» ) рқ‘ғ ( рқҗ» ) P(+)=P(+вҲЈD)P(D)+P(+вҲЈH)P(H) = 0.99 ( 0.01 ) + 0.01 ( 0.99 ) = =0.99(0.01)+0.01(0.99)=0.0198 Step 3: Result рқ‘ғ ( рқҗ· вҲЈ + ) = 0.0099 / 0.0198 = P(DвҲЈ+)=0.0099/0.0198=50% Why only 50%? The disease is rare. In 10,000 people, only 100 are sick (99 test positive). But 9,900 are healthy, and 1% of those (99 people) also test positive! Half of all positives are false alarms. Interactive: Medical Test Simulator Adjust disease rat", "url": "https://www.tensortonic.com/ml-math/probability/bayes-theorm?problem=bayes-theorem", "template": "// Bayes: P(H|E) = P(E|H) * P(H) / P(E)\n// GPU use: update many hypotheses in parallel\n#include <cuda_runtime.h>\n\n__global__ void bayesian_update(const float* prior,          // P(H_i)\n                                 const float* likelihood,     // P(E|H_i)\n                                 float* posterior,            // P(H_i|E)\n                                 float p_evidence,            // P(E)\n                                 int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n)\n        posterior[i] = likelihood[i] * prior[i] / p_evidence;\n}\n\n// P(E) = ОЈ P(E|H_i) * P(H_i) вҖ” compute with parallel reduction first\n__global__ void marginal_likelihood(const float* prior, const float* likelihood,\n                                     float* out, int n) {\n    __shared__ float smem[256];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n    smem[tid] = (i < n) ? likelihood[i] * prior[i] : 0.0f;\n    __syncthreads();\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n"}, "monte-carlo-pi": {"slug": "monte-carlo-pi", "title": "Monte Carlo Methods", "section": "Probability", "topic": "Monte Carlo", "description": "Introduction Many problems are theoretically solvable but computationally impossible. Calculating portfolio risk requires integrating over thousands of correlated assets. Finding the optimal Go move requires searching a tree with more states than atoms in the universe. The Monte Carlo Philosophy If you cannot calculate the answer, simulate it millions of times and average. \"If you cannot calculate the area of a lake, throw a million rocks at it. Count how many splash vs. hit ground. That ratio gives you the area.\" History: The Manhattan Project The Problem 1940s Los Alamos. Stanislaw Ulam needed to calculate the probability of neutron chain reactions. The differential equations were too complex. The Solution Instead of solving equations, simulate individual neutrons moving randomly and observe outcomes. Named after the Monaco casino because it relies on chance (LLN). The Dartboard Method (Estimating Pi) How do you calculate pi without geometry? Throw darts randomly. Setup Square with side 2 рқ‘ҹ 2r. Area = 4 рқ‘ҹ 2 4r 2 Circle inscribed with radius рқ‘ҹ r. Area = рқңӢ рқ‘ҹ 2 ПҖr 2 Ratio = рқңӢ рқ‘ҹ 2 4 рқ‘ҹ 2 = рқңӢ 4 4r 2 ПҖr 2 вҖӢ = 4 ПҖ вҖӢ Simulation Throw рқ‘Ғ N darts randomly at square Count how many land inside circle Ratio = рқ‘Ғ inside рқ‘Ғ = рқңӢ 4 N N inside вҖӢ вҖӢ = 4 ПҖ вҖӢ рқңӢ = 4 Г— рқ‘Ғ inside рқ‘Ғ ПҖ=4Г— N N inside вҖӢ вҖӢ More darts = better estimate. This is the Law of Large Numbers in action. Interactive: Estimate Pi Throw virtual darts at a square. Watch the estimate converge to 3.14159... as you add more darts. ESTIMATED О  0.00000 Acc: 0.00% TOTAL DARTS 0 Inside: 0 Paused CONVERGENCE ПҖ 0 5000 10000 Darts Monte Carlo Integration For complex functions in high dimensions, standard numerical integration fails. Monte Carlo converts integrals into expectations. рқҗј = вҲ« рқ‘ү рқ‘“ ( рқ‘Ҙ ) рқ‘‘ рқ‘Ҙ вүҲ рқ‘ү вӢ… 1 рқ‘Ғ вҲ‘ рқ‘– = 1 рқ‘Ғ рқ‘“ ( рқ‘Ҙ рқ‘– ) I=вҲ« V вҖӢ f(x)dxвүҲVвӢ… N 1 вҖӢ вҲ‘ i=1 N вҖӢ f(x i вҖӢ ) Replace integral with sample average. рқ‘ү V = volume of domain, рқ‘Ҙ рқ‘– x i вҖӢ = random samples. Convergence Rate Error вҲқ 1 рқ‘Ғ ErrorвҲқ N вҖӢ 1 вҖӢ To halve error: need 4 Г— 4Г— samples. Slow convergence, but independent of dimension! Beating the Curse of Dimensionality Grid-based methods suffer exponentially as dimensions increase. Monte Carlo does not. Dimension Grid Points (10/axis) Monte Carlo 1D (Line) 10 ~100 3D (Cube) 1,000 ~100 10D 10 billion ~1,000 100D 10^100 (impossible) ~10,000 This is why Monte Carlo is the ONLY way to solve high-dimensional physics and Bayesian inference problems. Markov Chain Monte Carlo (MCMC) What if we cannot sample uniformly? MCMC generates samples from complex distributions using a Markov Chain that explores high-probability regions. Metropolis-Hastings Algorithm Start at random point рқ‘Ҙ 0 x 0 вҖӢ Propose new point рқ‘Ҙ вҖІ x вҖІ nearby ( рқ‘Ҙ вҖІ = рқ‘Ҙ 0 + noise x вҖІ =x 0 вҖӢ +noise) Calculate acceptance ratio: рқӣј = рқ‘ғ ( рқ‘Ҙ вҖІ ) рқ‘ғ ( рқ‘Ҙ 0 ) Оұ= P(x 0 вҖӢ ) P(x вҖІ ) вҖӢ If рқӣј вүҘ 1 ОұвүҘ1: always move to рқ‘Ҙ вҖІ x вҖІ If рқӣј < 1 Оұ<1: move with probability рқӣј Оұ, else stay Repeat thousands of times Why it works The chain spends more time in high-probability regions. After \"burn-in,\" samples are from the target distribution. Key parameter Step size matters! Too small: slow exploration. Too large: many rejections. Target 20-50% acceptance. Interactive: MCMC Visualization Watch Metropolis-Hastings explore a bimodal distribution (two peaks). Adjust step size to see how it affects exploration. STATUS Paused PROPOSAL STEP SIZE 0.80 Cautious (High Accept) Bold (Low Accept) CHAIN STATISTICS Acceptance Ratio 0.0% Goldilocks Principle: Too high (>80%): Steps are too small, exploring slowly. Too low (<20%): Steps are too big, constantly rejected. Target: ~20-50% for optimal mixing. WHY BIMODAL? Notice how the chain gets \"stuck\" in one peak for a while, then eventually makes a lucky jump across the valley to the other peak. This 'mode hopping' is the hardest challenge in MCMC. ML Applications Reinforcement Learning (MC Prediction) Estimate state value рқ‘ү ( рқ‘  ) V(s) by playing many episodes and averaging returns: рқ‘ү ( рқ‘  ) вүҲ 1 рқ‘Ғ вҲ‘ рқ‘– = 1 рқ‘Ғ рқҗә рқ‘– ( рқ‘  ) V(s)вүҲ N 1 вҖӢ вҲ‘ i=1 N вҖӢ ", "url": "https://www.tensortonic.com/ml-math/probability/monte-carlo?problem=monte-carlo-pi", "template": "// Monte Carlo ПҖ estimation:\n// Sample (x,y) вҲҲ [0,1]ВІ, count points inside unit circle (xВІ+yВІ < 1)\n// ПҖ вүҲ 4 * (points_inside / total_points)\n#include <cuda_runtime.h>\n#include <curand_kernel.h>\n\n__global__ void mc_pi(unsigned long seed, int* inside_count, int n_per_thread) {\n    int tid = blockIdx.x * blockDim.x + threadIdx.x;\n\n    curandState state;\n    curand_init(seed, tid, 0, &state);\n\n    int count = 0;\n    for (int i = 0; i < n_per_thread; i++) {\n        float x = curand_uniform(&state);\n        float y = curand_uniform(&state);\n        if (x*x + y*y < 1.0f) count++;\n    }\n    atomicAdd(inside_count, count);\n}\n// pi вүҲ 4.0f * inside_count / (n_threads * n_per_thread)\n// Compile with: nvcc -lcurand monte_carlo.cu\n"}, "manual-backprop": {"slug": "manual-backprop", "title": "Backpropagation & Gradient Descent", "section": "Calculus", "topic": "Backpropagation", "description": "Introduction In PyTorch or TensorFlow, you call .backward() and gradients magically appear. But to truly understand optimization, you must be able to derive gradients by hand for simple networks. This is the ultimate test of your understanding of the chain rule and partial derivatives. We will dissect a single neuron with Sigmoid activation and MSE loss, then learn how to use those gradients for optimization. What We'll Learn Part 1: Backpropagation Compute вҲӮ рқҗҝ вҲӮ рқ‘Ө вҲӮw вҲӮL вҖӢ and вҲӮ рқҗҝ вҲӮ рқ‘Ҹ вҲӮb вҲӮL вҖӢ by hand Part 2: Gradient Descent Use gradients to iteratively minimize loss The Setup: A Single Neuron We define a computational graph with input x, weight w, bias b, and target y_true. Variables рқ‘Ҙ = 2.0 x=2.0 (Input) рқ‘Ө = 3.0 w=3.0 (Weight) рқ‘Ҹ = 1.0 b=1.0 (Bias) рқ‘Ұ рқ‘Ў рқ‘ҹ рқ‘ў рқ‘’ = 1.0 y true вҖӢ =1.0 (Target) Functions Linear: рқ‘§ = рқ‘Ө рқ‘Ҙ + рқ‘Ҹ z=wx+b Activation: рқ‘Һ = рқңҺ ( рқ‘§ ) = 1 1 + рқ‘’ вҲ’ рқ‘§ a=Пғ(z)= 1+e вҲ’z 1 вҖӢ Loss: рқҗҝ = ( рқ‘Һ вҲ’ рқ‘Ұ ) 2 L=(aвҲ’y) 2 Computation Graph x, w, b вҶ’ z = wx + b вҶ’ a = Пғ(z) вҶ’ L = (a-y)ВІ Forward Pass Calculate values from input to output: 1. Linear Combination рқ‘§ = ( 3.0 ) ( 2.0 ) + 1.0 = 7.0 z=(3.0)(2.0)+1.0=7.0 2. Sigmoid Activation рқ‘Һ = рқңҺ ( 7.0 ) = 1 1 + рқ‘’ вҲ’ 7 вүҲ 0.999089 a=Пғ(7.0)= 1+e вҲ’7 1 вҖӢ вүҲ0.999089 3. MSE Loss рқҗҝ = ( 0.999089 вҲ’ 1.0 ) 2 вүҲ 8.3 Г— 10 вҲ’ 7 L=(0.999089вҲ’1.0) 2 вүҲ8.3Г—10 вҲ’7 Backward Pass (Backpropagation) We want вҲӮ рқҗҝ вҲӮ рқ‘Ө вҲӮw вҲӮL вҖӢ and вҲӮ рқҗҝ вҲӮ рқ‘Ҹ вҲӮb вҲӮL вҖӢ . We can't jump directly; we must use the chain rule: вҲӮ рқҗҝ вҲӮ рқ‘Ө = вҲӮ рқҗҝ вҲӮ рқ‘Һ вӢ… вҲӮ рқ‘Һ вҲӮ рқ‘§ вӢ… вҲӮ рқ‘§ вҲӮ рқ‘Ө вҲӮw вҲӮL вҖӢ = вҲӮa вҲӮL вҖӢ вӢ… вҲӮz вҲӮa вҖӢ вӢ… вҲӮw вҲӮz вҖӢ Part A: Loss w.r.t Activation Function: рқҗҝ = ( рқ‘Һ вҲ’ рқ‘Ұ ) 2 L=(aвҲ’y) 2 вҲӮ рқҗҝ вҲӮ рқ‘Һ = 2 ( рқ‘Һ вҲ’ рқ‘Ұ ) = 2 ( 0.999089 вҲ’ 1.0 ) = вҲ’ 0.001822 вҲӮa вҲӮL вҖӢ =2(aвҲ’y)=2(0.999089вҲ’1.0)=вҲ’0.001822 Part B: Activation w.r.t Linear Sigmoid derivative: рқңҺ вҖІ ( рқ‘§ ) = рқңҺ ( рқ‘§ ) ( 1 вҲ’ рқңҺ ( рқ‘§ ) ) = рқ‘Һ ( 1 вҲ’ рқ‘Һ ) Пғ вҖІ (z)=Пғ(z)(1вҲ’Пғ(z))=a(1вҲ’a) вҲӮ рқ‘Һ вҲӮ рқ‘§ = 0.999089 ( 1 вҲ’ 0.999089 ) вүҲ 0.000910 вҲӮz вҲӮa вҖӢ =0.999089(1вҲ’0.999089)вүҲ0.000910 Part C: Linear w.r.t Weight Function: рқ‘§ = рқ‘Ө рқ‘Ҙ + рқ‘Ҹ z=wx+b вҲӮ рқ‘§ вҲӮ рқ‘Ө = рқ‘Ҙ = 2.0 вҲӮw вҲӮz вҖӢ =x=2.0 Chain Rule in Action Now multiply all the local gradients together: Gradient for Weight (w) вҲӮ рқҗҝ вҲӮ рқ‘Ө = ( вҲ’ 0.001822 ) Г— ( 0.000910 ) Г— ( 2.0 ) вҲӮw вҲӮL вҖӢ =(вҲ’0.001822)Г—(0.000910)Г—(2.0) вҲӮ рқҗҝ вҲӮ рқ‘Ө вүҲ вҲ’ 3.316 Г— 10 вҲ’ 6 вҲӮw вҲӮL вҖӢ вүҲвҲ’3.316Г—10 вҲ’6 Gradient for Bias (b) Note: вҲӮ рқ‘§ вҲӮ рқ‘Ҹ = 1 вҲӮb вҲӮz вҖӢ =1 вҲӮ рқҗҝ вҲӮ рқ‘Ҹ = ( вҲ’ 0.001822 ) Г— ( 0.000910 ) Г— ( 1 ) вҲӮb вҲӮL вҖӢ =(вҲ’0.001822)Г—(0.000910)Г—(1) вҲӮ рқҗҝ вҲӮ рқ‘Ҹ вүҲ вҲ’ 1.658 Г— 10 вҲ’ 6 вҲӮb вҲӮL вҖӢ вүҲвҲ’1.658Г—10 вҲ’6 Why So Small? The gradients are tiny because the prediction (0.999) is very close to the target (1.0), so the loss is already nearly minimized. Also, Sigmoid at z=7 has a very small derivative (0.0009) due to saturation. Gradient Descent: Using the Gradients Now that we know how to compute gradients, we need to know what to do with them. Gradient Descent is the optimization algorithm that uses gradients to iteratively update parameters, minimizing the loss function. The Core Idea Start somewhere. Look at the slope. Take a small step downhill. Repeat until you reach the bottom. The Blindfolded Hiker Analogy 1 Feel the Ground Use your feet to determine which direction is \"downhill.\" (Compute gradient) 2 Take a Step Move in the downhill direction. Step size depends on confidence. (Update parameters) 3 Repeat Keep going until the ground feels flat (gradient near 0). You've reached a minimum. The Update Rule Let рқҗҪ ( рқңғ ) J(Оё) be our loss function, where рқңғ Оё represents all model parameters: рқңғ рқ‘ӣ рқ‘’ рқ‘Ө = рқңғ рқ‘ң рқ‘ҷ рқ‘‘ вҲ’ рқӣј вҲҮ рқҗҪ ( рқңғ рқ‘ң рқ‘ҷ рқ‘‘ ) Оё new вҖӢ =Оё old вҖӢ вҲ’ОұвҲҮJ(Оё old вҖӢ ) рқңғ Оё Parameters we're optimizing (weights, biases). Could be millions of values. рқӣј Оұ Learning rate. A hyperparameter controlling step size. Critical to get right. вҲҮ рқҗҪ вҲҮJ Gradient vector. Points toward steepest ascent. Hence the minus sign. Why Subtract the Gradient? The gradient вҲҮ рқҗҪ ( рқңғ ) вҲҮJ(Оё) points in the direction of steepest increase. Since we want to minimize loss (go downhill), we move in the opposite direction. If we added the gradient, we'd be doing gradient ascent. Interactive: Learning Rate Effects Experiment with different learning ra", "url": "https://www.tensortonic.com/ml-math/calculus/backpropagation?problem=manual-backprop", "template": "// Manual backprop for a 2-layer MLP: x вҶ’ Linear вҶ’ ReLU вҶ’ Linear вҶ’ Loss\n#include <cuda_runtime.h>\n\n// Forward: z = W*x + b, a = ReLU(z)\n__global__ void linear_forward(const float* W, const float* x, const float* b,\n                                float* z, int in, int out) {\n    int j = blockIdx.x * blockDim.x + threadIdx.x;  // output neuron\n    if (j >= out) return;\n    float s = b[j];\n    for (int i = 0; i < in; i++) s += W[j * in + i] * x[i];\n    z[j] = s;\n}\n\n__global__ void relu_forward(const float* z, float* a, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n) a[i] = fmaxf(0.0f, z[i]);\n}\n\n// Backward: dL/dW = dL/da * da/dz * dz/dW = delta * x^T\n__global__ void grad_weights(const float* delta, const float* x,\n                              float* dW, int in, int out) {\n    int j = blockIdx.x * blockDim.x + threadIdx.x;\n    if (j >= out) return;\n    for (int i = 0; i < in; i++)\n        dW[j * in + i] = delta[j] * x[i];\n}\n"}, "cross-entropy-implementation": {"slug": "cross-entropy-implementation", "title": "Cross-Entropy Loss", "section": "Info Theory", "topic": "Cross-Entropy", "description": "Introduction When training a classifier (image recognition, spam detection, language modeling), the model outputs probabilities for each class. For a cat image, it might output: рқ‘Ұ ^ = [ 0.8 , 0.2 ] y ^ вҖӢ =[0.8,0.2] (80% Cat, 20% Dog). The true label is рқ‘Ұ = [ 1.0 , 0.0 ] y=[1.0,0.0] (100% Cat). We need a way to measure how \"wrong\" the prediction is. Cross-Entropy is that measure. Why \"Cross\"? Entropy measures uncertainty using the true distribution. Cross-Entropy measures uncertainty using a different (predicted) distribution. The \"cross\" refers to using P to weight but Q to compute information. Intuition: Penalty for Wrong Codes Imagine you're designing a compression code for English text. You assign short codes to frequent letters ('e', 't') and long codes to rare letters ('z', 'q'). But what if you designed the code based on French letter frequencies? You'd use the wrong code lengths. Some letters would have wastefully long codes, others too short. This inefficiency is measured by Cross-Entropy. рқҗ» ( рқ‘ғ , рқ‘„ ) = Average bits using code Q for data from P H(P,Q)=Average bits using code Q for data from P If Q = P (perfect model), Cross-Entropy equals Entropy. If Q is wrong, Cross-Entropy is higher. The General Formula For discrete probability distributions P (truth) and Q (prediction): рқҗ» ( рқ‘ғ , рқ‘„ ) = вҲ’ вҲ‘ рқ‘Ҙ рқ‘ғ ( рқ‘Ҙ ) ln вҒЎ рқ‘„ ( рқ‘Ҙ ) H(P,Q)=вҲ’вҲ‘ x вҖӢ P(x)lnQ(x) We average over P (what actually happens) but compute information using Q (our model's probabilities). Key Relationship рқҗ» ( рқ‘ғ , рқ‘„ ) = рқҗ» ( рқ‘ғ ) + рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) H(P,Q)=H(P)+D KL вҖӢ (PвҲЈвҲЈQ) Cross-Entropy = Entropy of P + KL Divergence. Since H(P) is constant (data is fixed), minimizing Cross-Entropy is equivalent to minimizing KL Divergence. Interactive: Loss Curve Explore how the loss changes with prediction confidence. Notice the exponential penalty for confident wrong predictions. Binary Cross-Entropy Loss Adjust the model's prediction and see how the loss changes. Wrong confident predictions are heavily penalized. True Label = 1 (Positive) True Label = 0 (Negative) Model Prediction P(class=1) = 0.70 Predicted P(class=1) Loss 0 0.5 1 True Label 1 Prediction 0.70 Loss 0.3567 Confidently Correct! The model's prediction aligns with the true label. Low loss. Binary Cross-Entropy (BCE) For binary classification (0 or 1), we have one output neuron with Sigmoid activation. Let рқ‘Ұ y be the label (0 or 1) and рқ‘Ұ ^ y ^ вҖӢ be the prediction. рқҗҝ = вҲ’ [ рқ‘Ұ ln вҒЎ ( рқ‘Ұ ^ ) + ( 1 вҲ’ рқ‘Ұ ) ln вҒЎ ( 1 вҲ’ рқ‘Ұ ^ ) ] L=вҲ’[yln( y ^ вҖӢ )+(1вҲ’y)ln(1вҲ’ y ^ вҖӢ )] If y = 1 (Positive) Loss = вҲ’ ln вҒЎ ( рқ‘Ұ ^ ) вҲ’ln( y ^ вҖӢ ) We want рқ‘Ұ ^ y ^ вҖӢ close to 1. If it's 0.9, loss is 0.1. If it's 0.001, loss is 6.9! If y = 0 (Negative) Loss = вҲ’ ln вҒЎ ( 1 вҲ’ рқ‘Ұ ^ ) вҲ’ln(1вҲ’ y ^ вҖӢ ) We want рқ‘Ұ ^ y ^ вҖӢ close to 0. Categorical Cross-Entropy (CCE) For multi-class classification (MNIST digits 0-9, ImageNet 1000 classes), we use Softmax activation. Let рқ‘Ұ y be a one-hot vector (e.g., [ 0 , 1 , 0 , . . . , 0 ] [0,1,0,...,0] for digit 1). рқҗҝ = вҲ’ вҲ‘ рқ‘җ = 1 рқҗ¶ рқ‘Ұ рқ‘җ ln вҒЎ ( рқ‘Ұ ^ рқ‘җ ) L=вҲ’вҲ‘ c=1 C вҖӢ y c вҖӢ ln( y ^ вҖӢ c вҖӢ ) Since y is one-hot, only the term for the true class survives: рқҗҝ = вҲ’ ln вҒЎ ( рқ‘Ұ ^ рқ‘Ў рқ‘ҹ рқ‘ў рқ‘’ ) L=вҲ’ln( y ^ вҖӢ true вҖӢ ) This is why PyTorch's nn.CrossEntropyLoss only needs the class index, not a one-hot vector. The framework handles the one-hot encoding internally! Interactive: BCE vs CCE Compare how Binary and Categorical Cross-Entropy compute loss for different scenarios. Binary vs Categorical Cross-Entropy Compare how loss is calculated for binary classification (2 classes) vs multi-class classification. Binary (2 Classes) Categorical (4 Classes) Predicted Probability for Positive Class: 0.700 0.01 0.99 Formula (y = 1) рқҗҝ = вҲ’ ln вҒЎ ( рқ‘Ұ ^ ) L=вҲ’ln( y ^ вҖӢ ) рқҗҝ = вҲ’ ln вҒЎ ( 0.700 ) = 0.357 L=вҲ’ln(0.700)=0.357 Binary Cross-Entropy Loss 0.357 Key Insight Binary CE only considers the probability of the true class. As the model becomes more confident (p вҶ’ 1), loss decreases. Wrong confident predictions (p вҶ’ 0) have huge loss! The Beautiful Gradient One reason Cross-Entropy is ", "url": "https://www.tensortonic.com/ml-math/information-theory/cross-entropy?problem=cross-entropy-implementation", "template": "// Cross-Entropy: H(y, p) = -ОЈ y_i * log(p_i)\n// y = true labels (one-hot), p = predicted probabilities\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n#define EPS 1e-7f  // avoid log(0)\n\n__global__ void cross_entropy_reduce(const float* y, const float* p,\n
