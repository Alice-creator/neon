                  float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    float yi = (i < n) ? y[i] : 0.0f;\n    float pi = (i < n) ? p[i] : 1.0f;\n    smem[tid] = -yi * logf(pi + EPS);\n    __syncthreads();\n\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n"}, "pmf-pdf-cdf": {"slug": "pmf-pdf-cdf", "title": "Probability Distributions", "section": "Probability", "topic": "Distributions", "description": "Introduction A Random Variable is a variable whose value depends on the outcome of a random event. A Probability Distribution describes the likelihood of each possible value. Core Question: If I sample from this process, what values am I likely to see, and how often? Discrete Countable outcomes: coin flips, dice rolls, number of emails. Function: PMF (Probability Mass Function) Rule: вҲ‘ рқ‘ғ ( рқ‘Ҙ ) = 1 вҲ‘P(x)=1 Continuous Infinite outcomes in a range: height, time, temperature. Function: PDF (Probability Density Function) Rule: вҲ« рқ‘“ ( рқ‘Ҙ ) рқ‘‘ рқ‘Ҙ = 1 вҲ«f(x)dx=1 PMF, PDF, and CDF These three functions fully describe any probability distribution. PMF: Probability Mass Function (Discrete) Gives the probability of exactly each value: рқ‘ғ ( рқ‘Ӣ = рқ‘ҳ ) P(X=k) Example: For a fair die, PMF ( 3 ) = 1 / 6 PMF(3)=1/6 PDF: Probability Density Function (Continuous) Gives probability density, not probability itself. рқ‘ғ ( рқ‘Ӣ = рқ‘Ҙ ) = 0 P(X=x)=0 for any single point! The probability of a range is the area under the curve: рқ‘ғ ( рқ‘Һ < рқ‘Ӣ < рқ‘Ҹ ) = вҲ« рқ‘Һ рқ‘Ҹ рқ‘“ ( рқ‘Ҙ ) рқ‘‘ рқ‘Ҙ P(a<X<b)=вҲ« a b вҖӢ f(x)dx CDF: Cumulative Distribution Function (Both) Gives the probability of being at or below a value: рқҗ№ ( рқ‘Ҙ ) = рқ‘ғ ( рқ‘Ӣ вүӨ рқ‘Ҙ ) F(x)=P(XвүӨx) Always starts at 0, ends at 1, and never decreases. Discrete (PMF) Continuous (PDF) PDF f(x) P(X=0.0) = 0 Curve shows density. Any single point has P=0! Only areas have probability. Integrate / Sum CDF F(x) = P(X вүӨ x) 0.5 1.0 0 F(0.0) = 50.0% CDF always starts at 0, ends at 1, and never decreases. (Smooth curve for continuous) Adjust x value x = 0.00 рқҗ№ ( рқ‘Ҙ ) = рқ‘ғ ( рқ‘Ӣ вүӨ рқ‘Ҙ ) = вҲ« вҲ’ вҲһ рқ‘Ҙ рқ‘“ ( рқ‘Ў ) рқ‘‘ рқ‘Ў F(x)=P(XвүӨx)=вҲ« вҲ’вҲһ x вҖӢ f(t)dtвҖўThe CDF height equals the shaded area in the PDF/PMF above it. Interactive: Distribution Explorer Select different distributions and adjust their parameters to build intuition for how they behave. Normal Binomial Poisson Exponential Beta Probability Density Function рқ‘“ ( рқ‘Ҙ ) = 1 2 рқңӢ 1.0 2 рқ‘’ вҲ’ ( рқ‘Ҙ вҲ’ 0.0 ) 2 2 ( 1.0 ) 2 f(x)= 2ПҖ1.0 2 вҖӢ 1 вҖӢ e вҲ’ 2(1.0) 2 (xвҲ’0.0) 2 вҖӢ Click sample to generate data Sample Data PARAMETERS Mean (Ој) 0.0 Std Dev (Пғ) 1.0 THEORETICAL MOMENTS Expected (Mean) 0.00 Variance 1.00 Discrete Distributions Bernoulli Single trial One trial with two outcomes: Success (1) with probability p, Failure (0) with probability 1-p. Mean: рқ‘қ p Variance: рқ‘қ ( 1 вҲ’ рқ‘қ ) p(1вҲ’p) ML: Logistic Regression output. Binary Cross-Entropy is derived from Bernoulli likelihood. Binomial n trials Number of successes k in n independent Bernoulli trials. рқ‘ғ ( рқ‘ҳ ) = ( рқ‘ӣ рқ‘ҳ ) рқ‘қ рқ‘ҳ ( 1 вҲ’ рқ‘қ ) рқ‘ӣ вҲ’ рқ‘ҳ P(k)=( k n вҖӢ )p k (1вҲ’p) nвҲ’k Mean: рқ‘ӣ рқ‘қ np Variance: рқ‘ӣ рқ‘қ ( 1 вҲ’ рқ‘қ ) np(1вҲ’p) ML: A/B testing (how many users convert out of 1000?). Poisson Rare events Number of events in a fixed interval, given average rate lambda. рқ‘ғ ( рқ‘ҳ ) = рқңҶ рқ‘ҳ рқ‘’ вҲ’ рқңҶ рқ‘ҳ ! P(k)= k! О» k e вҲ’О» вҖӢ Mean: рқңҶ О» Variance: рқңҶ О» ML: Website traffic spikes, call center volume, Poisson Regression. Continuous Distributions Normal (Gaussian) The King The bell curve. Defined by mean рқңҮ Ој and variance рқңҺ 2 Пғ 2 . Due to the Central Limit Theorem, sums of random variables converge to this. рқ‘“ ( рқ‘Ҙ ) = 1 рқңҺ 2 рқңӢ i = 1; i < n; i++)\n            out[i] = out[i-1] + in[i];\n    }\n}\n"}, "calculate-median": {"slug": "calculate-median", "title": "Descriptive Statistics: Mean, Median, Mode, Variance & Std Dev", "section": "Statistics", "topic": "Basic Statistics", "description": "Introduction Before diving into machine learning algorithms, we need a solid foundation in descriptive statistics. These are the tools that allow us to summarize and understand data at a glance. Think about your exam scores from last semester. Instead of memorizing every single grade, wouldn't it be easier to just know your average? That's statistics in action. Taking a bunch of numbers and distilling them into something useful. What is Descriptive Statistics? Descriptive statistics are the tools we use to summarize and describe data. Instead of looking at thousands of numbers, we extract a few key metrics that tell the story. For example: \"This app has a 4.2 star rating based on 10,000 reviews.\" That one number summarizes thousands of individual opinions into a single, useful metric. In this guide, we'll cover the essential building blocks: mean, median, mode (where is the \"center\" of your data?), and variance, standard deviation (how spread out is your data?). These concepts show up everywhere: from understanding survey results to building machine learning models and understanding probability distributions. Why This Matters for ML Engineers Make sense of data: Quickly summarize thousands of numbers into a few key insights. Spot problems: Identify unusual values that might be errors or important exceptions. Compare fairly: Understand if two datasets are truly different or just appear so. Build intuition: These concepts are the foundation for everything in data science, from Bayesian inference to batch normalization. The Mean (Average) The most common way to summarize data is to find its center: a single value that represents the \"typical\" data point. The mean is the most widely used measure of center. Definition The arithmetic mean is the sum of all values divided by the count of values. It is what most people call \"the average.\" рқ‘Ҙ Лү = 1 рқ‘ӣ вҲ‘ рқ‘– = 1 рқ‘ӣ рқ‘Ҙ рқ‘– = рқ‘Ҙ 1 + рқ‘Ҙ 2 + вҖҰ + рқ‘Ҙ рқ‘ӣ рқ‘ӣ x Лү = n 1 вҖӢ вҲ‘ i=1 n вҖӢ x i вҖӢ = n x 1 вҖӢ +x 2 вҖӢ +вҖҰ+x n вҖӢ вҖӢ Example: Bulb Lifespans You test 5 bulbs with lifespans: 980, 1000, 1010, 1020, 1040 hours. Mean = (980 + 1000 + 1010 + 1020 + 1040) / 5 = 1010 hours The Median (Middle Value) The mean works well for symmetric data, but it has a weakness: outliers can pull it away from the true center. The median solves this by focusing on position rather than value. Definition The median is the middle value when all data points are sorted. If there is an even number of points, it is the average of the two middle values. Median = { рқ‘Ҙ рқ‘ӣ + 1 2 if рқ‘ӣ is odd рқ‘Ҙ рқ‘ӣ 2 + рқ‘Ҙ рқ‘ӣ 2 + 1 2 if рқ‘ӣ is even Median= вҺ© вҺЁ вҺ§ вҖӢ x 2 n+1 вҖӢ вҖӢ 2 x 2 n вҖӢ вҖӢ +x 2 n вҖӢ +1 вҖӢ вҖӢ вҖӢ if n is odd if n is even вҖӢ Example: With an Outlier Lifespans: 500, 980, 1000, 1010, 1020 hours. (One bulb failed early.) Sorted: 500, 980, 1000, 1010, 1020 Median = 1000 hours (the middle value) Mean = 902 hours (pulled down by the outlier) Notice how the median is more representative of the \"typical\" bulb. The Mode (Most Frequent) Sometimes you do not care about the average or middle value. You want to know what shows up the most. This is especially useful for categorical data where mean and median do not apply. Definition The mode is the value that appears most frequently in the dataset. A dataset can have no mode, one mode (unimodal), or multiple modes (bimodal, multimodal). Example: Categorical Data Bulb quality ratings: Good, Good, Good, Excellent, Fair, Good, Excellent Mode = Good (appears 4 times) Skewness So far we have covered three ways to find the center of your data: the mean, median, and mode. But here is a question: what if the mean and median give different answers? That happens when your data is not symmetric. Skewness describes the shape of your data distribution. Is it balanced on both sides, or does it have a long tail stretching in one direction? Symmetric Skewness вүҲ 0 вүҲ0 Mean вүҲ вүҲ Median вүҲ вүҲ Mode Right-Skewed (+) Skewness > 0 >0 Tail stretches right. Mode < < Median < < Mean. Left-Skewed (-) Skewness < 0 <0 Tail stretches left. Mean < < Median < < Mode. Sk", "url": "https://www.tensortonic.com/ml-math/statistics/basic-statistics?problem=calculate-median", "template": "// Descriptive Statistics: Mean, Median, Mode, Variance & Std Dev\n// Section: Statistics | Topic: Basic Statistics\n//\n// GPU Implementation Plan:\n//   1. Identify the core computation pattern:\n//      - Is it a reduction? (sum, max, mean)\n//      - Is it element-wise? (activation functions)\n//      - Is it a matrix op? (matmul, transpose)\n//   2. Choose appropriate thread/block layout\n//   3. Implement kernel with shared memory if needed\n//   4. Verify correctness on small example first\n//\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n\n__global__ void kernel_calculate_median(/* TODO: add parameters */) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    // TODO: implement Descriptive Statistics: Mean, Median, Mode, Variance & Std Dev on GPU\n}\n\n// Launch:\n// int blocks = (n + BLOCK_SIZE - 1) / BLOCK_SIZE;\n// kernel_calculate_median<<<blocks, BLOCK_SIZE>>>(/* args */);\n// cudaDeviceSynchronize();\n"}, "conditional-probability": {"slug": "conditional-probability", "title": "Conditional Probability", "section": "Probability", "topic": "Conditional Probability", "description": "Introduction We constantly update our beliefs based on new information. If it is cloudy, you revise your estimate of the probability of rain. If a medical test is positive, a doctor updates their assessment of whether a patient has a disease. Conditional Probability answers: \"What is the chance of E happening given that F has already happened?\" Written as рқ‘ғ ( рқҗё вҲЈ рқҗ№ ) P(EвҲЈF), read \"the probability of E given F\" Simple Example: Rolling a Die Roll a fair six-sided die. What is P(rolled a 5)? Answer: рқ‘ғ ( 5 ) = 1 / 6 P(5)=1/6 since there are 6 equally likely outcomes. Now someone tells you the roll was odd. What is P(5 | odd)? The possible outcomes are now {1, 3, 5}. Only one of these three is a 5. рқ‘ғ ( 5 вҲЈ odd ) = 1 / 3 P(5вҲЈodd)=1/3 The probability jumped from 1/6 to 1/3 because conditioning eliminated half the sample space. The Formal Definition рқ‘ғ ( рқҗё вҲЈ рқҗ№ ) = рқ‘ғ ( рқҗё вҲ© рқҗ№ ) рқ‘ғ ( рқҗ№ ) P(EвҲЈF)= P(F) P(EвҲ©F) вҖӢ provided that рқ‘ғ ( рқҗ№ ) > 0 P(F)>0 рқ‘ғ ( рқҗё вҲ© рқҗ№ ) P(EвҲ©F) Probability that both E and F occur (the intersection) рқ‘ғ ( рқҗ№ ) P(F) Probability that F occurs (the new \"universe\") Why divide? We rescale probabilities to the new sample space F Interactive: Visualizing Conditional Probability Adjust the probabilities and see how P(E|F) and P(F|E) change. Notice that they are generally NOT equal! Interactive Conditional Probability Adjust the probabilities and see how P(E|F) changes. The shaded intersection represents P(E and F). P(E): 0.40 P(F): 0.50 P(EвҲ©F): 0.20 P(E|F) 0.400 = 0.20 / 0.50 P(F|E) 0.500 = 0.20 / 0.40 Independence YES P(E)P(F) = 0.20 Sample Space S E F EвҲ©F P(E|F) asks: \"Of the green area (F), what fraction is orange (intersection)?\" Analysis: Independent Events Knowing F occurred gives us no new information about E. The probability stays the same (P(E|F) вүҲ P(E)). Worked Examples Movie Recommendations Netflix wants to predict if a user will watch \"Life is Beautiful\" (E), given they watched \"Amelie\" (F). Overall P(E) = 0.02 (2% of all users) Given Amelie P(E|F) = 0.09 (9%) Watching Amelie makes a user 4.5x more likely to watch Life is Beautiful. This is why recommendation systems track conditional probabilities. Family Composition A family has 4 children. Given that they have at least one boy, what is P(exactly 2 boys)? Let E = \"exactly 2 boys\", F = \"at least 1 boy\" All 16 sequences (BBBB, BBBG, ..., GGGG) are equally likely. F eliminates only GGGG, leaving 15 outcomes. Among these 15, exactly 6 have two boys. рқ‘ғ ( рқҗё вҲЈ рқҗ№ ) = 6 / 16 15 / 16 = 6 15 = 0.4 P(EвҲЈF)= 15/16 6/16 вҖӢ = 15 6 вҖӢ =0.4 Independence Two events are independent if knowing one occurred does not change the probability of the other. Definition 1 рқ‘ғ ( рқҗё вҲЈ рқҗ№ ) = рқ‘ғ ( рқҗё ) P(EвҲЈF)=P(E) Definition 2 (Equivalent) рқ‘ғ ( рқҗё вҲ© рқҗ№ ) = рқ‘ғ ( рқҗё ) вӢ… рқ‘ғ ( рқҗ№ ) P(EвҲ©F)=P(E)вӢ…P(F) Testing Independence Roll a die. Let A = {3} and B = {1, 3, 5} (odd numbers). P(A) = 1/6 P(B) = 3/6 = 1/2 P(A вҲ© B) = P({3}) = 1/6 Check: P(A) x P(B) = (1/6)(1/2) = 1/12 Since 1/12 вү  1/6, the events are NOT independent. Independence вү  Mutual Exclusivity Mutually exclusive: P(E вҲ© F) = 0 (cannot both occur) Independent: P(E вҲ© F) = P(E)P(F) (one does not affect the other) If events are mutually exclusive with nonzero probabilities, they are never independent. Knowing A occurred tells you B definitely did NOT occur. The Chain Rule (Multiplication Rule) Rearranging the conditional probability formula gives us the Chain Rule: рқ‘ғ ( рқҗё вҲ© рқҗ№ ) = рқ‘ғ ( рқҗ№ ) вӢ… рқ‘ғ ( рқҗё вҲЈ рқҗ№ ) P(EвҲ©F)=P(F)вӢ…P(EвҲЈF) or equivalently рқ‘ғ ( рқҗё вҲ© рқҗ№ ) = рқ‘ғ ( рқҗё ) вӢ… рқ‘ғ ( рқҗ№ вҲЈ рқҗё ) P(EвҲ©F)=P(E)вӢ…P(FвҲЈE) This extends to any number of events. For three events: рқ‘ғ ( рқҗҙ вҲ© рқҗө вҲ© рқҗ¶ ) = рқ‘ғ ( рқҗҙ ) вӢ… рқ‘ғ ( рқҗө вҲЈ рқҗҙ ) вӢ… рқ‘ғ ( рқҗ¶ вҲЈ рқҗҙ , рқҗө ) P(AвҲ©BвҲ©C)=P(A)вӢ…P(BвҲЈA)вӢ…P(CвҲЈA,B) Example: Drawing Marbles A jar has 7 black and 3 white marbles. Draw two without replacement. What is P(both black)? P(B1) = 7/10 P(B2|B1) = 6/9 (after removing one black, 6 black remain out of 9) P(B1 вҲ© B2) = (7/10)(6/9) = 42/90 = 0.467 Chain Rule in Language Models The chain rule is the foundation of autoregressive models like GPT: рқ‘ғ ( рқ‘Ө 1 , рқ‘Ө 2 ", "url": "https://www.tensortonic.com/ml-math/probability/conditional-probability?problem=conditional-probability", "template": "// P(A|B) = P(A вҲ© B) / P(B)\n// GPU: compute conditional probabilities for many events in parallel\n#include <cuda_runtime.h>\n\n// Each thread computes P(A_i | B) for one event A_i\n__global__ void conditional_prob(const float* p_joint,  // P(A_i вҲ© B)\n                                  float p_b,             // P(B)\n                                  float* p_cond,         // P(A_i | B)\n                                  int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n)\n        p_cond[i] = p_joint[i] / p_b;\n}\n"}, "kl-divergence": {"slug": "kl-divergence", "title": "Kullback-Leibler Divergence", "section": "Info Theory", "topic": "KL Divergence", "description": "Introduction In geometry, we measure distance between points with Euclidean distance. But how do we measure the \"distance\" between two probability distributions? For example, how different is a Gaussian рқ‘Ғ ( 0 , 1 ) N(0,1) from рқ‘Ғ ( 2 , 2 ) N(2,2)? Or the word distribution in Shakespeare versus a Reddit thread? KL Divergence (Kullback-Leibler Divergence, also called Relative Entropy) quantifies this difference. It measures how much information is lost when we approximate one distribution with another. Not a True Metric While KL Divergence is often called a \"distance,\" it doesn't satisfy all the properties of a mathematical distance metric (it's asymmetric and doesn't obey the triangle inequality). Think of it as a directed measure of divergence. Intuition: Extra Bits Imagine you're designing a compression code for English text. Optimal codes assign short representations to frequent letters ('e', 't') and long ones to rare letters ('z', 'q'). P (True Distribution): The actual frequency of letters in English. Q (Model/Approximation): Your guess at the frequency (maybe based on French). If you build your code based on Q but data comes from P, your code will be inefficient. You'll use long codes for letters that are actually common. KL Divergence = Extra Bits рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) D KL вҖӢ (PвҲЈвҲЈQ) measures the extra bits you need to transmit because you used the wrong distribution Q instead of the true P. It quantifies the cost of your approximation. The Formula For discrete probability distributions P and Q: рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) = вҲ‘ рқ‘Ҙ рқ‘ғ ( рқ‘Ҙ ) log вҒЎ ( рқ‘ғ ( рқ‘Ҙ ) рқ‘„ ( рқ‘Ҙ ) ) D KL вҖӢ (PвҲЈвҲЈQ)=вҲ‘ x вҖӢ P(x)log( Q(x) P(x) вҖӢ ) = вҲ‘ рқ‘Ҙ рқ‘ғ ( рқ‘Ҙ ) [ log вҒЎ рқ‘ғ ( рқ‘Ҙ ) вҲ’ log вҒЎ рқ‘„ ( рқ‘Ҙ ) ] =вҲ‘ x вҖӢ P(x)[logP(x)вҲ’logQ(x)] Critical Warning If рқ‘ғ ( рқ‘Ҙ ) > 0 P(x)>0 but рқ‘„ ( рқ‘Ҙ ) = 0 Q(x)=0, KL divergence goes to infinity. The model Q thinks an event is impossible when it actually occurs. This is a fatal modeling error called \"zero-avoiding\" behavior. For Continuous Distributions рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) = вҲ« рқ‘ғ ( рқ‘Ҙ ) log вҒЎ ( рқ‘ғ ( рқ‘Ҙ ) рқ‘„ ( рқ‘Ҙ ) ) рқ‘‘ рқ‘Ҙ D KL вҖӢ (PвҲЈвҲЈQ)=вҲ«P(x)log( Q(x) P(x) вҖӢ )dx For Gaussians, there's a closed-form solution, making KL Divergence computationally efficient. Interactive: KL Between Gaussians Explore how KL divergence changes as you move the model distribution Q away from the true distribution P. KL Divergence Distance between q(z|x) and prior N(0,1) Ој (mean shift) 0.0 log ПғВІ (variance) 0.0 (Пғ = 1.00) p(z) = N(0,1) q(z|x) z KL = 0.000 вң“ Close to prior KL = -ВҪ Г— (1 + log ПғВІ - ОјВІ - ПғВІ) = -ВҪ Г— (1 + 0.0 - 0.00 - 1.00) Asymmetry: Not a True Distance In geometry, distance is symmetric: Distance(A to B) = Distance(B to A). KL Divergence is NOT symmetric. рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) вү  рқҗ· рқҗҫ рқҗҝ ( рқ‘„ вҲЈ вҲЈ рқ‘ғ ) D KL вҖӢ (PвҲЈвҲЈQ) оҖ  =D KL вҖӢ (QвҲЈвҲЈP) This asymmetry is not a bug. It reflects a real difference: \"How much does Q fail to capture P?\" is a different question from \"How much does P fail to capture Q?\" Worked Example Let рқ‘ғ = [ 0.5 , 0.5 ] P=[0.5,0.5] (fair coin) and рқ‘„ = [ 0.9 , 0.1 ] Q=[0.9,0.1] (biased coin). Forward KL: рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) D KL вҖӢ (PвҲЈвҲЈQ) = 0.5 вӢ… ln вҒЎ ( 0.5 0.9 ) + 0.5 вӢ… ln вҒЎ ( 0.5 0.1 ) =0.5вӢ…ln( 0.9 0.5 вҖӢ )+0.5вӢ…ln( 0.1 0.5 вҖӢ ) = 0.5 вӢ… ( вҲ’ 0.588 ) + 0.5 вӢ… ( 1.609 ) =0.5вӢ…(вҲ’0.588)+0.5вӢ…(1.609) = 0.511 nats =0.511 nats Reverse KL: рқҗ· рқҗҫ рқҗҝ ( рқ‘„ вҲЈ вҲЈ рқ‘ғ ) D KL вҖӢ (QвҲЈвҲЈP) = 0.9 вӢ… ln вҒЎ ( 0.9 0.5 ) + 0.1 вӢ… ln вҒЎ ( 0.1 0.5 ) =0.9вӢ…ln( 0.5 0.9 вҖӢ )+0.1вӢ…ln( 0.5 0.1 вҖӢ ) = 0.9 вӢ… ( 0.588 ) + 0.1 вӢ… ( вҲ’ 1.609 ) =0.9вӢ…(0.588)+0.1вӢ…(вҲ’1.609) = 0.368 nats =0.368 nats 0.511 вү  0.368 0.511 оҖ  =0.368 - The direction matters! What are \"nats\"? Nats (natural units) measure information using ln вҒЎ ln (natural log, base рқ‘’ e). Bits use log вҒЎ 2 log 2 вҖӢ . To convert: 1 nat = 1 ln вҒЎ ( 2 ) вүҲ 1.44 bits 1 nat= ln(2) 1 вҖӢ вүҲ1.44 bits. Deep learning frameworks typically use nats because ln вҒЎ ln has simpler derivatives. Forward vs Reverse KL The choice between рқҗ· рқҗҫ рқҗҝ ( рқ‘ғ вҲЈ вҲЈ рқ‘„ ) D KL вҖӢ (PвҲЈвҲЈQ) (Forward) and рқҗ· рқҗҫ рқҗҝ ( рқ‘„ вҲЈ вҲЈ рқ‘ғ ) D KL вҖӢ (QвҲЈвҲЈP) (Reverse) has major implications for how your model behaves. Forward KL: DKL(P || Q) Mean-Seeking / Moment", "url": "https://www.tensortonic.com/ml-math/information-theory/kl-divergence?problem=kl-divergence", "template": "// KL Divergence: KL(P||Q) = ОЈ p_i * log(p_i / q_i)\n// Note: KL is not symmetric вҖ” KL(P||Q) вү  KL(Q||P)\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n#define EPS 1e-7f\n\n__global__ void kl_divergence_reduce(const float* p, const float* q,\n                                      float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    float pi = (i < n && p[i] > 0) ? p[i] : 0.0f;\n    float qi = (i < n) ? q[i] + EPS : EPS;\n    smem[tid] = (pi > 0) ? pi * logf(pi / qi) : 0.0f;\n    __syncthreads();\n\n    for (int s = blockDim.x/2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid+s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n"}, "matrix-multiplication": {"slug": "matrix-multiplication", "title": "Matrix Multiplication", "section": "Linear Algebra", "topic": "Matrix Multiplication", "description": "Introduction Every layer in a neural network, from simple feed-forward networks to GPT's attention blocks, is fundamentally matrix multiplication followed by non-linearities. Understanding matrix multiplication is essential to understanding deep learning. Matrix multiplication is not just \"multiplying numbers.\" It is combining information and transforming space. Prerequisites Before diving in, make sure you understand Dot Product and Norms. Matrix multiplication is essentially many dot products computed in parallel. The Dimension Rule You cannot multiply any two matrices. Their dimensions must align in a specific way. (m Г— n)Г—(n Г— p)=(m Г— p) Inner dimensions must match. Result takes outer dimensions. Valid вң“ (3 Г— 4) Г— (4 Г— 2) = (3 Г— 2) Invalid вң— (3 Г— 4) Г— (3 Г— 2) = ??? INNER DIMENSIONS DO NOT MATCH (4 вү  3) Practical Tip Dimension mismatch errors are one of the most common bugs in ML code. Always trace dimensions through your network architecture before implementing. The Dot Product View Each element C[i][j] in the result is the dot product of row i from A and column j from B. рқҗ¶ рқ‘– рқ‘— = вҲ‘ рқ‘ҳ = 1 рқ‘ӣ рқҗҙ рқ‘– рқ‘ҳ вӢ… рқҗө рқ‘ҳ рқ‘— C ij вҖӢ =вҲ‘ k=1 n вҖӢ A ik вҖӢ вӢ…B kj вҖӢ Walk along row i of A and column j of B simultaneously, multiplying and summing. Intuition Think of it as asking: \"How much does row i of A align with column j of B?\" High alignment means a large value in C[i][j]. Row and Column Interpretations There are multiple ways to think about matrix multiplication beyond the element-by-element view. Column View Each column of C is a linear combination of columns of A, with coefficients from the corresponding column of B. рқҗ¶ : , рқ‘— = вҲ‘ рқ‘ҳ рқҗө рқ‘ҳ рқ‘— вӢ… рқҗҙ : , рқ‘ҳ C :,j вҖӢ =вҲ‘ k вҖӢ B kj вҖӢ вӢ…A :,k вҖӢ Row View Each row of C is a linear combination of rows of B, with coefficients from the corresponding row of A. рқҗ¶ рқ‘– , : = вҲ‘ рқ‘ҳ рқҗҙ рқ‘– рқ‘ҳ вӢ… рқҗө рқ‘ҳ , : C i,: вҖӢ =вҲ‘ k вҖӢ A ik вҖӢ вӢ…B k,: вҖӢ Outer Product View C is the sum of outer products of columns of A with rows of B. рқҗ¶ = вҲ‘ рқ‘ҳ рқҗҙ : , рқ‘ҳ вҠ— рқҗө рқ‘ҳ , : C=вҲ‘ k вҖӢ A :,k вҖӢ вҠ—B k,: вҖӢ Interactive: Step-by-Step Step through the multiplication of a 2Г—3 matrix by a 3Г—2 matrix. Watch how each result cell is computed as a dot product. Matrix Multiplication Target Cell = Row A В· Col B Step 1 / 4 A [2Г—3] 1 2 3 4 5 6 Г— B [3Г—2] 7 8 9 10 11 12 = C [2Г—2] 58 OPERATION Row 1 В· Col 1 A Г— B 1 В· 7 7 + A Г— B 2 В· 9 18 + A Г— B 3 В· 11 33 = Sum 58 Play Animation Transformation View Think of a matrix as a function that transforms vectors. This geometric perspective is crucial for understanding deep learning. If x is a point in space, Ax moves that point. The matrix stretches, rotates, shears, and reflects space. ( рқҗҙ рқҗө ) рқ‘Ҙ = рқҗҙ ( рқҗө рқ‘Ҙ ) (AB)x=A(Bx) AB is a single transformation: apply B first, then A. Rotation Orthogonal matrices rotate vectors without changing their length. Scaling Diagonal matrices scale each axis independently. Projection Some matrices project onto lower-dimensional subspaces. Shearing Off-diagonal elements create shearing effects. Key Properties Non-Commutative рқҗҙ рқҗө вү  рқҗө рқҗҙ AB оҖ  =BA Order matters! AB and BA often have different dimensions or values. Rotating then scaling is different from scaling then rotating. Associative ( рқҗҙ рқҗө ) рқҗ¶ = рқҗҙ ( рқҗө рқҗ¶ ) (AB)C=A(BC) Choose multiplication order for efficiency. Distributive рқҗҙ ( рқҗө + рқҗ¶ ) = рқҗҙ рқҗө + рқҗҙ рқҗ¶ A(B+C)=AB+AC Transpose and Products The transpose operation (swapping rows and columns) interacts with multiplication in important ways. The Transpose Rule ( рқҗҙ рқҗө ) рқ‘Ү = рқҗө рқ‘Ү рқҗҙ рқ‘Ү (AB) T =B T A T Order reverses! Critical in backpropagation derivation. Gram Matrix рқҗә = рқҗҙ рқ‘Ү рқҗҙ G=A T A Always symmetric positive semi-definite. Used in style transfer. Special Matrices Diagonal Only diagonal elements are non-zero. Scale O(n). Orthogonal рқ‘„ рқ‘Ү рқ‘„ = рқҗј Q T Q=I Preserves lengths and angles (rotation/reflection). Symmetric рқҗҙ = рқҗҙ рқ‘Ү A=A T Has real eigenvalues. Hessian matrices are symmetric. Sparse Most elements are zero. Efficient storage/compute. Batched Operations In deep learning, we rarely multiply single matrices. We work with batches of data pro", "url": "https://www.tensortonic.com/ml-math/linear-algebra/matrix-multiplication?problem=matrix-multiplication", "template": "// Naive GEMM: C[i][j] = ОЈ_k A[i][k] * B[k][j]\n// Each thread computes one element of C\n#include <cuda_runtime.h>\n\n__global__ void matmul_naive(const float* A, const float* B, float* C,\n                              int M, int N, int K) {\n    int row = blockIdx.y * blockDim.y + threadIdx.y;  // i\n    int col = blockIdx.x * blockDim.x + threadIdx.x;  // j\n\n    if (row >= M || col >= N) return;\n\n    float sum = 0.0f;\n    for (int k = 0; k < K; k++)\n        sum += A[row * K + k] * B[k * N + col];\n\n    C[row * N + col] = sum;\n}\n\n// dim3 threads(16, 16);\n// dim3 blocks((N+15)/16, (M+15)/16);\n// matmul_naive<<<blocks, threads>>>(d_A, d_B, d_C, M, N, K);\n//\n// TODO: optimize with shared memory tiling (Phase 8)\n"}, "ab-test-setup": {"slug": "ab-test-setup", "title": "A/B Testing", "section": "Statistics", "topic": "A/B Testing", "description": "What is A/B Testing? Imagine you have an idea: \"Changing this button from blue to green will get more clicks.\" How do you know if you're right? You could just change it and see what happens. But maybe sales went up because it was a holiday, not because of the button. You'd never know for sure. A/B Testing is the scientific way to find out. You split your users into two groups. Group A sees the old blue button. Group B sees the new green button. Since everything else is the same, if Group B clicks more, you know the green button caused it. The \"Fair Test\" Rule The key is randomness. You can't just show the new button to VIP users and the old one to new users. That's not a fair fight. By flipping a coin for every user, you ensure the two groups are practically identical before the test starts. Setting the Rules Before we start, we need to agree on what we're testing. In statistics, we act like a judge in a courtroom. We assume the change does nothing until the evidence is overwhelming. The Skeptic ( рқҗ» 0 H 0 вҖӢ ) Also called the Null Hypothesis. This is the assumption that your idea didn't work. \"The green button is just as good (or bad) as the blue one.\" Group A = Group B Group A=Group B The Discovery ( рқҗ» 1 H 1 вҖӢ ) Also called the Alternative Hypothesis. This is what you hope to prove. \"The green button is actually different.\" Group A вү  Group B Group A оҖ  =Group B Type I & Type II Errors We can never be 100% sure. We deal in probabilities. There are two ways to be wrong, and they have real business consequences. Truth: рқҗ» 0 H 0 вҖӢ is True (No real effect) Truth: рқҗ» 1 H 1 вҖӢ is True (Real effect exists) We Decide: Reject рқҗ» 0 H 0 вҖӢ Type I Error False Positive We thought it worked, but it was luck. Prob = рқӣј Оұ Correct Decision True Positive We found a real win! Prob = 1 вҲ’ рқӣҪ 1вҲ’ОІ (Power) We Decide: Keep рқҗ» 0 H 0 вҖӢ Correct Decision True Negative We rightly ignored the noise. Type II Error False Negative We missed a real opportunity. Prob = рқӣҪ ОІ Business Impact Example: Light Bulb Packaging Type I Error (False Positive): You roll out the new packaging to all stores based on a fluke result. The packaging actually doesn't help. You spent $50,000 on new printing plates for nothing. Type II Error (False Negative): The new packaging would have increased sales by 5%, but your test was too short/small to detect it. You abandon a great idea. You lose $100,000/year in potential revenue. The Math (Two-Sample рқ‘Қ Z-Test) How do we know if the difference between Group A and Group B is real? We calculate a рқ‘Қ Z-score, which tells us how many standard deviations away our observed difference is from zero (no difference). рқ‘Қ = рқ‘қ ^ рқҗө вҲ’ рқ‘қ ^ рқҗҙ рқ‘қ ^ ( 1 вҲ’ рқ‘қ ^ ) ( 1 рқ‘ӣ рқҗҙ + 1 рқ‘ӣ рқҗө ) Z= p ^ вҖӢ (1вҲ’ p ^ вҖӢ )( n A вҖӢ 1 вҖӢ + n B вҖӢ 1 вҖӢ ) вҖӢ p ^ вҖӢ B вҖӢ вҲ’ p ^ вҖӢ A вҖӢ вҖӢ рқ‘қ ^ рқҗҙ , рқ‘қ ^ рқҗө p ^ вҖӢ A вҖӢ , p ^ вҖӢ B вҖӢ : Conversion rates of A and B. рқ‘қ ^ p ^ вҖӢ : Pooled conversion rate (total conversions / total visitors). рқ‘ӣ рқҗҙ , рқ‘ӣ рқҗө n A вҖӢ ,n B вҖӢ : Sample sizes. If вҲЈ рқ‘Қ вҲЈ > 1.96 вҲЈZвҲЈ>1.96, we are 95% confident the difference is not due to chance ( рқ‘қ < 0.05 p<0.05). Critical Z-Values Table 90% Confidence Z = 1.645 95% Confidence Z = 1.96 99% Confidence Z = 2.576 Power Analysis Before starting, you must ask: \"How many users do I need?\" If you stop too early, you might miss a real effect (Type II Error). This is called being \"underpowered.\" Statistical Power ( 1 вҲ’ рқӣҪ 1вҲ’ОІ) The probability of detecting an effect if it actually exists. Industry standard is 80%, meaning you have an 80% chance of finding a true effect. Some critical tests (e.g., medical) require 90%. Power is affected by four levers: Baseline Rate: Current conversion rate (e.g., 5%). Higher baselines are easier to shift. MDE (Minimum Detectable Effect): The smallest lift you care about (e.g., +1%). Detecting smaller lifts requires much more data. Significance Level ( рқӣј Оұ): Usually 5%. Lower рқӣј Оұ (stricter) requires more data. Sample Size ( рқ‘ӣ n): Bigger рқ‘ӣ n = more power. This is the main lever you control. Sample Size Calculation The formula for requir", "url": "https://www.tensortonic.com/ml-math/statistics/ab-testing?problem=ab-test-setup", "template": "// A/B test: compare conversion rates between two groups\n// z = (p_A - p_B) / sqrt(p*(1-p)*(1/nA + 1/nB))  pooled proportion\n#include <cuda_runtime.h>\n\n// Simulate many A/B tests in parallel (power analysis)\n__global__ void simulate_ab_test(float true_p_a, float true_p_b,\n                                   int n_per_group, float* z_scores,\n                                   int n_simulations, unsigned long seed) {\n    int s = blockIdx.x * blockDim.x + threadIdx.x;\n    if (s >= n_simulations) return;\n\n    curandState state;\n    curand_init(seed, s, 0, &state);\n\n    int conv_a = 0, conv_b = 0;\n    for (int i = 0; i < n_per_group; i++) {\n        if (curand_uniform(&state) < true_p_a) conv_a++;\n        if (curand_uniform(&state) < true_p_b) conv_b++;\n    }\n    float pa = (float)conv_a / n_per_group;\n    float pb = (float)conv_b / n_per_group;\n    float pp = (float)(conv_a + conv_b) / (2 * n_per_group);  // pooled\n    float se = sqrtf(pp * (1-pp) * (2.0f / n_per_group));\n    z_scores[s] = (pa - pb) / se;\n}\n"}, "pca-from-scratch": {"slug": "pca-from-scratch", "title": "Principal Component Analysis", "section": "Linear Algebra", "topic": "PCA", "description": "Introduction Real-world datasets are often high-dimensional. A customer might be described by 500 features: age, income, location, browsing history, purchase frequency, click patterns, and hundreds more. Many of these features are redundant or highly correlated (annual income and tax paid, for instance). Principal Component Analysis (PCA) is an unsupervised technique that transforms a large set of correlated variables into a smaller set of uncorrelated variables called Principal Components. These new variables are ordered: PC1 captures the most variance, PC2 captures the second most (while being orthogonal to PC1), and so on. What PCA Does Dimensionality Reduction: Compress 1000 features into 50 while keeping 95% of the information. Decorrelation: Transform correlated features into uncorrelated principal components. Noise Filtering: Lower PCs often capture noise; discarding them cleans the data. Feature Extraction: PCs can reveal hidden structure (clusters, patterns) not obvious in original features. Prerequisites PCA relies heavily on eigenvalues and eigenvectors. Make sure you understand these concepts before diving deep. The covariance matrix concept builds on dot products and matrix multiplication. The Curse of Dimensionality Why do we need dimensionality reduction at all? The curse of dimensionality describes several problems that arise when working with high-dimensional data: 1. Data Becomes Sparse In high dimensions, data points spread out. To maintain the same density, you need exponentially more samples. A dataset that feels \"dense\" in 2D becomes incredibly sparse in 100D. 2. Distance Metrics Break Down In high dimensions, the difference between the nearest and farthest neighbor becomes negligible. All points appear roughly equidistant, making distance-based algorithms (KNN, clustering) unreliable. lim вҒЎ рқ‘‘ вҶ’ вҲһ dist рқ‘ҡ рқ‘Һ рқ‘Ҙ вҲ’ dist рқ‘ҡ рқ‘– рқ‘ӣ dist рқ‘ҡ рқ‘– рқ‘ӣ вҶ’ 0 lim dвҶ’вҲһ вҖӢ dist min вҖӢ dist max вҖӢ вҲ’dist min вҖӢ вҖӢ вҶ’0 3. Overfitting Risk More features means more parameters to fit. With limited data, models memorize noise rather than learning true patterns. This is why regularization and dimensionality reduction are crucial. 4. Computational Cost Many algorithms have complexity O(nВ·dВІ) or worse. Reducing d from 10,000 to 100 can speed up training by 10,000Г—. The Core Intuition Imagine a 3D cloud of points shaped like a flat pancake floating diagonally in space. Looking at it from different angles gives you very different amounts of information: Bad View (Edge) Pancake looks like a line. Lost 2 dimensions of information. Medium View (Diagonal) See some structure but distorted. Best View (Top-Down) See the full pancake spread. Maximum information! PCA mathematically finds that \"best view.\" It rotates the coordinate system so that: PC1: The direction where data is most spread out (maximum variance). This is the \"length\" of the pancake. PC2: The direction with second-most spread, strictly perpendicular to PC1. This is the \"width.\" PC3: Perpendicular to both, capturing remaining variance. This is the \"thickness\" (usually small for a pancake). Variance = Information In PCA, we equate \"spread\" (variance) with \"information.\" If a variable has zero variance (everyone has the same value), it tells us nothing. We want to preserve directions where data varies the most. Interactive: PCA in Action This visualization shows correlated 2D data. Click \"Show PC Axes\" to see how PCA identifies the directions of maximum variance. Then project the data onto just PC1 to see dimensionality reduction in action. PCA Live View Finding direction of max spread. VIEW CONTROLS Show Principal Axes Project onto PC1 DATA SYNTHESIS New Data Correlation 0.85 Spread / Noise 1.5 EXPLAINED VARIANCE PC1 (Kept) 97.0% PC2 (Discarded) 3.0% How to use: Adjust the correlation to shape the data cloud. Enable Show Principal Axes to see how PCA identifies the angle of maximum variance (Emerald vector). Click Project onto PC1 to visualize dimensionality reduction: points slide down their ", "url": "https://www.tensortonic.com/ml-math/linear-algebra/pca?problem=pca-from-scratch", "template": "// PCA steps:\n// 1. Center data: X_c = X - mean(X)\n// 2. Covariance: C = (1/n) * X_c^T * X_c\n// 3. SVD of C: C = U * ОЈ * V^T\n// 4. Principal components = columns of U\n#include <cuda_runtime.h>\n\n// Step 1: center each feature\n__global__ void center_data(float* X, const float* means, int n, int d) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;  // sample\n    int j = blockIdx.y * blockDim.y + threadIdx.y;  // feature\n    if (i < n && j < d)\n        X[i * d + j] -= means[j];\n}\n\n// Step 2: covariance matrix C = X^T * X / n  (use matmul kernel)\n// Then SVD via cuSOLVER (see svd-decomposition template)\n// Step 4: project: Z = X_c * U[:, :k]  (top-k components)\n__global__ void project(const float* X, const float* U, float* Z,\n                         int n, int d, int k) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;  // sample\n    int c = blockIdx.y * blockDim.y + threadIdx.y;  // component\n    if (i >= n || c >= k) return;\n    float s = 0;\n    for (int j = 0; j < d; j++) s += X[i*d+j] * U[j*k+c];\n    Z[i*k+c] = s;\n}\n"}, "momentum-optimizer": {"slug": "momentum-optimizer", "title": "Momentum & Nesterov Acceleration", "section": "Optimization", "topic": "Momentum", "description": "Introduction Vanilla gradient descent is memoryless. Each step, it looks at the current gradient, takes a step, and immediately forgets everything. It doesn't know if it's been heading in the same direction for 1000 iterations or if it just turned around. This causes two major problems: Oscillation In narrow valleys (ravines), SGD bounces back and forth between steep walls, wasting computation. Slow Progress Along flat directions, gradients are tiny. SGD crawls, never building up speed. The Solution Momentum solves both by giving the optimizer memory. Nesterov improves it further by adding foresight. The SGD Problem: Ravines Real loss surfaces aren't perfect spherical bowls. They're often ravines: elongated valleys where the surface curves sharply in one direction and gently in another. The Ravine Scenario Consider рқ‘“ ( рқ‘Ҙ , рқ‘Ұ ) = рқ‘Ҙ 2 + 10 рқ‘Ұ 2 f(x,y)=x 2 +10y 2 . The y-direction has 10Г— steeper curvature than x. Y-Direction (Steep Walls) Gradient = 20y (HUGE) SGD takes big steps, overshoots, bounces back X-Direction (Gentle Floor) Gradient = 2x (small) SGD takes tiny steps, makes slow progress The Result SGD zigzags wildly across the ravine (y-direction) while creeping along the floor (x-direction). Most computation is wasted on oscillations, not progress toward the minimum. Physics of Momentum The fix comes from physics. Standard SGD treats the optimization variable like a massless particle: apply a force (gradient), it moves instantly; remove the force, it stops instantly. Momentum treats it like a heavy ball rolling down a hill. The ball has inertia. Once it's moving, it tends to keep moving in the same direction, even if the local slope changes. Velocity рқ‘Ј v The ball doesn't move based on current gradient alone; it moves based on accumulated velocity. The gradient is just a force that changes that velocity. Friction рқӣҪ ОІ Without friction, the ball would oscillate forever in a bowl. We need a decay factor (like air resistance) so the ball eventually stops at the bottom. Classical Momentum Instead of updating weights directly with the gradient, we update a velocity vector: VELOCITY UPDATE рқ‘Ј рқ‘Ў + 1 = рқӣҪ рқ‘Ј рқ‘Ў + рқңӮ вҲҮ рқҗҝ ( рқңғ рқ‘Ў ) v t+1 вҖӢ =ОІv t вҖӢ +О·вҲҮL(Оё t вҖӢ ) PARAMETER UPDATE рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқ‘Ј рқ‘Ў + 1 Оё t+1 вҖӢ =Оё t вҖӢ вҲ’v t+1 вҖӢ рқӣҪ ОІ Momentum coefficient (typically 0.9). Controls how much \"memory\" we keep. рқңӮ О· Learning rate. рқ‘Ј рқ‘Ў v t вҖӢ Velocity at step t. An exponential moving average of past gradients. Exponential Moving Average With рқӣҪ = 0.9 ОІ=0.9, the velocity roughly averages the last 1 / ( 1 вҲ’ 0.9 ) = 10 1/(1вҲ’0.9)=10 gradients. Recent gradients matter most; ancient history fades. Interactive: SGD vs Momentum Watch the optimizers navigate a ravine. Notice how SGD oscillates wildly while momentum methods smooth out the path. Optimizer Race Comparing trajectories. SGD struggles; Momentum accelerates. START RACE Reset Steps: 0 LIVE PERFORMANCE SGD Loss: 36.84000 Momentum Loss: 36.84000 Nesterov Loss: 36.84000 How Momentum Kills Oscillations In a ravine, gradients alternate: left wall вҶ’ right wall вҶ’ left wall. Without momentum, SGD follows each gradient blindly, bouncing forever. With Momentum When gradients point left-right-left-right, they cancel out in the velocity. The y-component of velocity shrinks to near zero. Meanwhile, the x-component (along the valley floor) doesn't cancel. It accumulates! The optimizer builds up speed in the consistent direction and ignores the oscillations. This is exactly like a car's shock absorbers: they damp out high-frequency bumps while preserving the smooth, long-term trajectory. Nesterov Acceleration Classical momentum has a subtle problem: it's reactive. It computes the gradient at the current position, then applies momentum. But we're about to move due to momentum anyway. Why not look ahead first? LOOKAHEAD POSITION рқңғ ~ рқ‘Ў = рқңғ рқ‘Ў вҲ’ рқӣҪ рқ‘Ј рқ‘Ў Оё ~ t вҖӢ =Оё t вҖӢ вҲ’ОІv t вҖӢ VELOCITY UPDATE (AT LOOKAHEAD) рқ‘Ј рқ‘Ў + 1 = рқӣҪ рқ‘Ј рқ‘Ў + рқңӮ вҲҮ рқҗҝ ( рқңғ ~ рқ‘Ў ) v t+1 вҖӢ =ОІv t вҖӢ +О·вҲҮL( Оё ~ t вҖӢ ) PARAMETER UPDATE рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқ‘Ј рқ‘Ў + 1 Оё t+1 вҖӢ =Оё t вҖӢ", "url": "https://www.tensortonic.com/ml-math/optimization/momentum-nesterov?problem=momentum-optimizer", "template": "// SGD + Momentum: v = ОІ*v - lr*grad,  Оё = Оё + v\n// Each thread handles one parameter\n#include <cuda_runtime.h>\n\n__global__ void momentum_update(float* params, float* velocity,\n                                 const float* grads,\n                                 float lr, float beta, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n    velocity[i] = beta * velocity[i] - lr * grads[i];\n    params[i]  += velocity[i];\n}\n\n// Nesterov variant: look-ahead gradient\n__global__ void nesterov_update(float* params, float* velocity,\n                                 const float* grads,\n                                 float lr, float beta, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n    float v_prev  = velocity[i];\n    velocity[i]   = beta * v_prev - lr * grads[i];\n    params[i]    += -beta * v_prev + (1 + beta) * velocity[i];\n}\n"}, "clt-simulation": {"slug": "clt-simulation", "title": "Central Limit Theorem (CLT)", "section": "Statistics", "topic": "Central Limit Theorem", "description": "Introduction The Central Limit Theorem (CLT) is arguably the most profound and useful concept in statistics. It explains a phenomenon that seems almost magical: if you take enough random samples from any population (no matter how weird, skewed, or irregular the distribution of that population is) the distribution of the means of those samples will form a perfect Bell Curve (Normal Distribution). This theorem is the foundation of hypothesis testing, confidence intervals, and essentially all of inferential statistics. It bridges the gap between the chaos of real-world data (which is rarely normal) and the orderly world of Gaussian mathematics. The \"Explain Like I'm 5\" Analogy Imagine a massive jar of candy with mixed shapes: some huge, some tiny, some square, some round. The sizes are all over the place (not a normal distribution). If you grab just one candy, its size is unpredictable. But if you grab a handful (a sample) and calculate the average size of that handful, and then repeat this hundreds of times... Those averages will plot out a perfect bell curve. Most handfuls will have an average size close to the true average of the whole jar. Very few handfuls will be all tiny or all huge. The Core Concept The CLT states that as the sample size рқ‘ӣ n increases, the sampling distribution of the sample mean рқ‘Ҙ Лү x Лү approaches a Normal Distribution рқ‘Ғ ( рқңҮ , рқңҺ рқ‘ӣ ) N(Ој, n вҖӢ Пғ вҖӢ ), regardless of the shape of the original population distribution. Input: Any Distribution The underlying population can be Uniform, Exponential, Binomial, Poisson, or completely irregular. It does not matter. Output: Normal Distribution The distribution of the sample means will always converge to normality as рқ‘ӣ n grows large. The Three Key Properties 1 Shape:The distribution of sample means becomes Normal (bell-shaped) 2 Center:The mean of sample means equals the population mean ( рқңҮ рқ‘Ҙ Лү = рқңҮ Ој x Лү вҖӢ =Ој) 3 Spread:The standard deviation shrinks by рқ‘ӣ n вҖӢ ( рқңҺ рқ‘Ҙ Лү = рқңҺ / рқ‘ӣ Пғ x Лү вҖӢ =Пғ/ n вҖӢ ) Interactive Demo: CLT in Action Watch the magic happen! Select a non-normal population distribution and see how the distribution of sample means becomes bell-shaped as you collect more samples. Try different sample sizes to see when the CLT kicks in. CLT Convergence Demo Watch how the distribution of sample means becomes Normal, regardless of the original population shape. Try different distributions and sample sizes! Population Distribution Uniform Exponential (Skewed) Bimodal Dice Roll (Discrete) Sample Size (n): 5 n=1 (No CLT) n=30 n=100 Start Sampling Add 1 Sample Reset Sample Mean Value Frequency SAMPLES DRAWN 0 MEAN OF MEANS - (Pop: 50.0) STD ERROR (OBSERVED) - (Theory: 12.91) CLT STATUS Weak (n < 30) Observe: Even though the population distribution is flat (uniform), the histogram of sample means becomes bell-shaped as you collect more samples. Increase n to 30+ to see stronger convergence! Formal Definition & Math Let рқ‘Ӣ 1 , рқ‘Ӣ 2 , вҖҰ , рқ‘Ӣ рқ‘ӣ X 1 вҖӢ ,X 2 вҖӢ ,вҖҰ,X n вҖӢ be a random sample of size рқ‘ӣ n drawn from a population with an arbitrary distribution, having a finite mean рқңҮ Ој and finite variance рқңҺ 2 Пғ 2 . рқ‘Ӣ Лү рқ‘ӣ вҶ’ рқ‘‘ рқ‘Ғ ( рқңҮ , рқңҺ 2 рқ‘ӣ ) X Лү n вҖӢ d вҖӢ N(Ој, n Пғ 2 вҖӢ ) As рқ‘ӣ вҶ’ вҲһ nвҶ’вҲһ, the sampling distribution of the mean converges to a Normal Distribution. рқ‘Қ = рқ‘Ӣ Лү вҲ’ рқңҮ рқңҺ / рқ‘ӣ вҲј рқ‘Ғ ( 0 , 1 ) Z= Пғ/ n вҖӢ X Лү вҲ’Ој вҖӢ вҲјN(0,1) The standardized sample mean follows the Standard Normal Distribution. Mean of Sampling Distribution рқҗё ( рқ‘Ӣ Лү ) = рқңҮ E( X Лү )=Ој The average of all possible sample means equals the population mean. (Unbiased estimator) Standard Error рқ‘Ҷ рқҗё = рқңҺ рқ‘ӣ SE= n вҖӢ Пғ вҖӢ The spread of sample means shrinks as sample size grows. Quadruple n to halve SE. Crucial Assumptions The CLT is powerful, but it is not unconditional. It relies on specific criteria being met. 1. Independence Samples must be independent of each other. The value of one observation cannot influence the next. (I.I.D - Independent and Identically Distributed). 2. Random Sampling Samples must be drawn randomly to ensure they are representa", "url": "https://www.tensortonic.com/ml-math/statistics/central-limit-theorem?problem=clt-simulation", "template": "// CLT: sum of n IID random vars вҶ’ Normal distribution as nвҶ’вҲһ\n// Simulate: draw many samples, compute their means, show they're normal\n#include <cuda_runtime.h>\n#include <curand_kernel.h>\n\n__global__ void simulate_sample_means(float* sample_means,\n                                       int n_samples, int sample_size,\n                                       unsigned long seed) {\n    int s = blockIdx.x * blockDim.x + threadIdx.x;\n    if (s >= n_samples) return;\n\n    curandState state;\n    curand_init(seed, s, 0, &state);\n\n    // Draw sample_size uniform [0,1] values, compute mean\n    float sum = 0;\n    for (int i = 0; i < sample_size; i++)\n        sum += curand_uniform(&state);\n    sample_means[s] = sum / sample_size;\n}\n// As sample_size increases, sample_means becomes more normal\n// Verify: compute mean вүҲ 0.5, std вүҲ 1/sqrt(12*sample_size)\n"}, "calculate-mean": {"slug": "calculate-mean", "title": "Descriptive Statistics: Mean, Median, Mode, Variance & Std Dev", "section": "Statistics", "topic": "Basic Statistics", "description": "Introduction Before diving into machine learning algorithms, we need a solid foundation in descriptive statistics. These are the tools that allow us to summarize and understand data at a glance. Think about your exam scores from last semester. Instead of memorizing every single grade, wouldn't it be easier to just know your average? That's statistics in action. Taking a bunch of numbers and distilling them into something useful. What is Descriptive Statistics? Descriptive statistics are the tools we use to summarize and describe data. Instead of looking at thousands of numbers, we extract a few key metrics that tell the story. For example: \"This app has a 4.2 star rating based on 10,000 reviews.\" That one number summarizes thousands of individual opinions into a single, useful metric. In this guide, we'll cover the essential building blocks: mean, median, mode (where is the \"center\" of your data?), and variance, standard deviation (how spread out is your data?). These concepts show up everywhere: from understanding survey results to building machine learning models and understanding probability distributions. Why This Matters for ML Engineers Make sense of data: Quickly summarize thousands of numbers into a few key insights. Spot problems: Identify unusual values that might be errors or important exceptions. Compare fairly: Understand if two datasets are truly different or just appear so. Build intuition: These concepts are the foundation for everything in data science, from Bayesian inference to batch normalization. The Mean (Average) The most common way to summarize data is to find its center: a single value that represents the \"typical\" data point. The mean is the most widely used measure of center. Definition The arithmetic mean is the sum of all values divided by the count of values. It is what most people call \"the average.\" рқ‘Ҙ Лү = 1 рқ‘ӣ вҲ‘ рқ‘– = 1 рқ‘ӣ рқ‘Ҙ рқ‘– = рқ‘Ҙ 1 + рқ‘Ҙ 2 + вҖҰ + рқ‘Ҙ рқ‘ӣ рқ‘ӣ x Лү = n 1 вҖӢ вҲ‘ i=1 n вҖӢ x i вҖӢ = n x 1 вҖӢ +x 2 вҖӢ +вҖҰ+x n вҖӢ вҖӢ Example: Bulb Lifespans You test 5 bulbs with lifespans: 980, 1000, 1010, 1020, 1040 hours. Mean = (980 + 1000 + 1010 + 1020 + 1040) / 5 = 1010 hours The Median (Middle Value) The mean works well for symmetric data, but it has a weakness: outliers can pull it away from the true center. The median solves this by focusing on position rather than value. Definition The median is the middle value when all data points are sorted. If there is an even number of points, it is the average of the two middle values. Median = { рқ‘Ҙ рқ‘ӣ + 1 2 if рқ‘ӣ is odd рқ‘Ҙ рқ‘ӣ 2 + рқ‘Ҙ рқ‘ӣ 2 + 1 2 if рқ‘ӣ is even Median= вҺ© вҺЁ вҺ§ вҖӢ x 2 n+1 вҖӢ вҖӢ 2 x 2 n вҖӢ вҖӢ +x 2 n вҖӢ +1 вҖӢ вҖӢ вҖӢ if n is odd if n is even вҖӢ Example: With an Outlier Lifespans: 500, 980, 1000, 1010, 1020 hours. (One bulb failed early.) Sorted: 500, 980, 1000, 1010, 1020 Median = 1000 hours (the middle value) Mean = 902 hours (pulled down by the outlier) Notice how the median is more representative of the \"typical\" bulb. The Mode (Most Frequent) Sometimes you do not care about the average or middle value. You want to know what shows up the most. This is especially useful for categorical data where mean and median do not apply. Definition The mode is the value that appears most frequently in the dataset. A dataset can have no mode, one mode (unimodal), or multiple modes (bimodal, multimodal). Example: Categorical Data Bulb quality ratings: Good, Good, Good, Excellent, Fair, Good, Excellent Mode = Good (appears 4 times) Skewness So far we have covered three ways to find the center of your data: the mean, median, and mode. But here is a question: what if the mean and median give different answers? That happens when your data is not symmetric. Skewness describes the shape of your data distribution. Is it balanced on both sides, or does it have a long tail stretching in one direction? Symmetric Skewness вүҲ 0 вүҲ0 Mean вүҲ вүҲ Median вүҲ вүҲ Mode Right-Skewed (+) Skewness > 0 >0 Tail stretches right. Mode < < Median < < Mean. Left-Skewed (-) Skewness < 0 <0 Tail stretches left. Mean < < Median < < Mode. Sk", "url": "https://www.tensortonic.com/ml-math/statistics/basic-statistics?problem=calculate-mean", "template": "// Mean = (1/n) * ОЈ x_i  вҶ’  two-step parallel reduction\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n\n__global__ void reduce_sum(const float* in, float* out, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    smem[tid] = (i < n) ? in[i] : 0.0f;\n    __syncthreads();\n\n    for (int s = blockDim.x / 2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid + s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n\n// Host: call reduce_sum twice, then mean = total / n\n// int blocks = (n + BLOCK_SIZE - 1) / BLOCK_SIZE;\n// reduce_sum<<<blocks, BLOCK_SIZE>>>(d_arr, d_partial, n);\n// reduce_sum<<<1,     BLOCK_SIZE>>>(d_partial, d_sum, blocks);\n// float mean = h_sum[0] / n;\n"}, "calculate-variance-std": {"slug": "calculate-variance-std", "title": "Descriptive Statistics: Mean, Median, Mode, Variance & Std Dev", "section": "Statistics", "topic": "Basic Statistics", "description": "Introduction Before diving into machine learning algorithms, we need a solid foundation in descriptive statistics. These are the tools that allow us to summarize and understand data at a glance. Think about your exam scores from last semester. Instead of memorizing every single grade, wouldn't it be easier to just know your average? That's statistics in action. Taking a bunch of numbers and distilling them into something useful. What is Descriptive Statistics? Descriptive statistics are the tools we use to summarize and describe data. Instead of looking at thousands of numbers, we extract a few key metrics that tell the story. For example: \"This app has a 4.2 star rating based on 10,000 reviews.\" That one number summarizes thousands of individual opinions into a single, useful metric. In this guide, we'll cover the essential building blocks: mean, median, mode (where is the \"center\" of your data?), and variance, standard deviation (how spread out is your data?). These concepts show up everywhere: from understanding survey results to building machine learning models and understanding probability distributions. Why This Matters for ML Engineers Make sense of data: Quickly summarize thousands of numbers into a few key insights. Spot problems: Identify unusual values that might be errors or important exceptions. Compare fairly: Understand if two datasets are truly different or just appear so. Build intuition: These concepts are the foundation for everything in data science, from Bayesian inference to batch normalization. The Mean (Average) The most common way to summarize data is to find its center: a single value that represents the \"typical\" data point. The mean is the most widely used measure of center. Definition The arithmetic mean is the sum of all values divided by the count of values. It is what most people call \"the average.\" рқ‘Ҙ Лү = 1 рқ‘ӣ вҲ‘ рқ‘– = 1 рқ‘ӣ рқ‘Ҙ рқ‘– = рқ‘Ҙ 1 + рқ‘Ҙ 2 + вҖҰ + рқ‘Ҙ рқ‘ӣ рқ‘ӣ x Лү = n 1 вҖӢ вҲ‘ i=1 n вҖӢ x i вҖӢ = n x 1 вҖӢ +x 2 вҖӢ +вҖҰ+x n вҖӢ вҖӢ Example: Bulb Lifespans You test 5 bulbs with lifespans: 980, 1000, 1010, 1020, 1040 hours. Mean = (980 + 1000 + 1010 + 1020 + 1040) / 5 = 1010 hours The Median (Middle Value) The mean works well for symmetric data, but it has a weakness: outliers can pull it away from the true center. The median solves this by focusing on position rather than value. Definition The median is the middle value when all data points are sorted. If there is an even number of points, it is the average of the two middle values. Median = { рқ‘Ҙ рқ‘ӣ + 1 2 if рқ‘ӣ is odd рқ‘Ҙ рқ‘ӣ 2 + рқ‘Ҙ рқ‘ӣ 2 + 1 2 if рқ‘ӣ is even Median= вҺ© вҺЁ вҺ§ вҖӢ x 2 n+1 вҖӢ вҖӢ 2 x 2 n вҖӢ вҖӢ +x 2 n вҖӢ +1 вҖӢ вҖӢ вҖӢ if n is odd if n is even вҖӢ Example: With an Outlier Lifespans: 500, 980, 1000, 1010, 1020 hours. (One bulb failed early.) Sorted: 500, 980, 1000, 1010, 1020 Median = 1000 hours (the middle value) Mean = 902 hours (pulled down by the outlier) Notice how the median is more representative of the \"typical\" bulb. The Mode (Most Frequent) Sometimes you do not care about the average or middle value. You want to know what shows up the most. This is especially useful for categorical data where mean and median do not apply. Definition The mode is the value that appears most frequently in the dataset. A dataset can have no mode, one mode (unimodal), or multiple modes (bimodal, multimodal). Example: Categorical Data Bulb quality ratings: Good, Good, Good, Excellent, Fair, Good, Excellent Mode = Good (appears 4 times) Skewness So far we have covered three ways to find the center of your data: the mean, median, and mode. But here is a question: what if the mean and median give different answers? That happens when your data is not symmetric. Skewness describes the shape of your data distribution. Is it balanced on both sides, or does it have a long tail stretching in one direction? Symmetric Skewness вүҲ 0 вүҲ0 Mean вүҲ вүҲ Median вүҲ вүҲ Mode Right-Skewed (+) Skewness > 0 >0 Tail stretches right. Mode < < Median < < Mean. Left-Skewed (-) Skewness < 0 <0 Tail stretches left. Mean < < Median < < Mode. Sk", "url": "https://www.tensortonic.com/ml-math/statistics/basic-statistics?problem=calculate-variance-std", "template": "// Variance = (1/n) * ОЈ (x_i - mean)ВІ  вҖ” two-pass approach\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n\n// Pass 1: compute mean (use reduce_sum from calculate-mean)\n\n// Pass 2: compute variance\n__global__ void reduce_variance(const float* arr, float* out, float mean, int n) {\n    __shared__ float smem[BLOCK_SIZE];\n    int tid = threadIdx.x;\n    int i   = blockIdx.x * blockDim.x + threadIdx.x;\n\n    float diff = (i < n) ? (arr[i] - mean) : 0.0f;\n    smem[tid] = diff * diff;\n    __syncthreads();\n\n    for (int s = blockDim.x / 2; s > 0; s >>= 1) {\n        if (tid < s) smem[tid] += smem[tid + s];\n        __syncthreads();\n    }\n    if (tid == 0) out[blockIdx.x] = smem[0];\n}\n\n// std_dev = sqrtf(variance)\n"}, "mutual-information": {"slug": "mutual-information", "title": "Mutual Information", "section": "Info Theory", "topic": "Mutual Information", "description": "Introduction We often ask: \"Are these two variables related?\" Standard statistics gives us Pearson Correlation, but that only measures linear relationships. What if the relationship is рқ‘Ұ = рқ‘Ҙ 2 y=x 2 ? A perfect parabola. Correlation might be near zero because it can't see non-linear patterns! Mutual Information (MI) is the information-theoretic solution. It measures any kind of relationship, linear or non-linear, monotonic or chaotic. It asks: \"By observing X, how many bits of uncertainty do I remove about Y?\" The Power of MI Unlike correlation, MI equals zero if and only if X and Y are truly independent. It's the gold standard for detecting any form of statistical dependence. Intuition: Shared Information Think of entropy as a \"circle\" of uncertainty. X has its circle of uncertainty H(X). Y has its circle H(Y). If X and Y are related, their circles overlap. H(X): Total uncertainty in X H(Y): Total uncertainty in Y H(X, Y): Joint uncertainty (the union) I(X; Y): Mutual Information (the intersection). The information shared between X and Y. The Key Insight Mutual Information tells you: \"If I know X, how much less uncertain am I about Y?\" If I(X;Y) = 0, knowing X tells you nothing about Y. They are statistically independent. Correlation vs Mutual Information This is the critical distinction. Why bother with MI when we have correlation? Pearson Correlation Only detects linear relationships. рқ‘Ұ = рқ‘Ҙ y=x : рқңҢ = 1.0 ПҒ=1.0 рқ‘Ұ = рқ‘Ҙ 2 y=x 2 (symmetric) : рқңҢ вүҲ 0 ПҒвүҲ0 рқ‘Ұ = sin вҒЎ ( рқ‘Ҙ ) y=sin(x) : рқңҢ вүҲ 0 ПҒвүҲ0 Mutual Information Detects any dependence. рқ‘Ұ = рқ‘Ҙ y=x : High MI рқ‘Ұ = рқ‘Ҙ 2 y=x 2 : High MI рқ‘Ұ = sin вҒЎ ( рқ‘Ҙ ) y=sin(x) : High MI The Bottom Line рқҗ¶ рқ‘ң рқ‘ҹ рқ‘ҹ рқ‘’ рқ‘ҷ рқ‘Һ рқ‘Ў рқ‘– рқ‘ң рқ‘ӣ = 0 Correlation=0 means no linear relationship. Variables might still be strongly connected. рқ‘Җ рқҗј = 0 MI=0 means true independence. No relationship of any kind exists. Interactive: Correlation vs MI See how correlation fails to detect non-linear relationships that Mutual Information captures perfectly. Linear Quadratic Sinusoidal Random Relationship: рқ‘Ұ = рқ‘Ҙ 2 y=x 2 X Y PEARSON CORRELATION Fails рқңҢ = 0.00 ПҒ=0.00 Only detects linear relationships MUTUAL INFORMATION Detects рқҗј = 1.8 I=1.8 Captures any dependence Quadratic: Correlation blind to symmetric parabola The Mathematical Formula Mutual Information is the KL Divergence between the joint distribution рқ‘ғ ( рқ‘Ӣ , рқ‘Ң ) P(X,Y) and the product of marginals рқ‘ғ ( рқ‘Ӣ ) рқ‘ғ ( рқ‘Ң ) P(X)P(Y). Why рқ‘ғ ( рқ‘Ӣ ) рқ‘ғ ( рқ‘Ң ) P(X)P(Y)? Because if X and Y were independent, their joint distribution would factor as рқ‘ғ ( рқ‘Ӣ , рқ‘Ң ) = рқ‘ғ ( рқ‘Ӣ ) рқ‘ғ ( рқ‘Ң ) P(X,Y)=P(X)P(Y). MI measures how far reality is from independence. рқҗј ( рқ‘Ӣ ; рқ‘Ң ) = вҲ‘ рқ‘Ҙ вҲ‘ рқ‘Ұ рқ‘ғ ( рқ‘Ҙ , рқ‘Ұ ) log вҒЎ ( рқ‘ғ ( рқ‘Ҙ , рқ‘Ұ ) рқ‘ғ ( рқ‘Ҙ ) рқ‘ғ ( рқ‘Ұ ) ) I(X;Y)=вҲ‘ x вҖӢ вҲ‘ y вҖӢ P(x,y)log( P(x)P(y) P(x,y) вҖӢ ) Alternative form using Entropy: рқҗј ( рқ‘Ӣ ; рқ‘Ң ) = рқҗ» ( рқ‘Ӣ ) + рқҗ» ( рқ‘Ң ) вҲ’ рқҗ» ( рқ‘Ӣ , рқ‘Ң ) I(X;Y)=H(X)+H(Y)вҲ’H(X,Y) For Continuous Variables рқҗј ( рқ‘Ӣ ; рқ‘Ң ) = вҲ« вҲ« рқ‘қ ( рқ‘Ҙ , рқ‘Ұ ) log вҒЎ ( рқ‘қ ( рқ‘Ҙ , рқ‘Ұ ) рқ‘қ ( рқ‘Ҙ ) рқ‘қ ( рқ‘Ұ ) ) рқ‘‘ рқ‘Ҙ рқ‘‘ рқ‘Ұ I(X;Y)=вҲ«вҲ«p(x,y)log( p(x)p(y) p(x,y) вҖӢ )dxdy Interactive: Joint Distribution Landscape Explore how the structure of the joint distribution рқ‘ғ ( рқ‘Ӣ , рқ‘Ң ) P(X,Y) relates to Mutual Information. High MI means the landscape is \"sharp\" or structured (knowing X constrains Y). Low MI means it's \"flat\" or grid-like (independence). Joint Distribution Landscape Visualize the joint probability рқ‘ғ ( рқ‘Ӣ , рқ‘Ң ) P(X,Y) as a heatmap. Mutual Information measures how \"structured\" this landscape is compared to the product of marginals. Independent Linear Clusters Circle Noise / Spread X Y High Low Entropy H(X) 4.30 Entropy H(Y) 4.30 Joint H(X,Y) 7.84 Mutual Info I(X;Y) 0.77 Observation: When there is structure (lines, circles, clusters), the joint distribution is 'sharper' than the product of marginals. MI is high. Interactive: Information Bits Visualize Mutual Information as shared bits in a data stream. When MI is high, the streams become synchronized (purple bits). Information Bits Stream Visualize Mutual Information as \"Shared Bits\" in a data stream. When bits are synchro", "url": "https://www.tensortonic.com/ml-math/information-theory/mutual-information?problem=mutual-information", "template": "// Mutual Information: I(X;Y) = H(X) + H(Y) - H(X,Y)\n// Or equivalently: I(X;Y) = ОЈ_xy p(x,y) * log[p(x,y)/(p(x)*p(y))]\n#include <cuda_runtime.h>\n#define BLOCK_SIZE 256\n#define EPS 1e-7f\n\n__global__ void mi_joint(const float* pxy, const float* px, const float* py,\n                          float* out, int nx, int ny) {\n    // Each thread handles one (x,y) cell of the joint distribution\n    int ix = blockIdx.y * blockDim.y + threadIdx.y;\n    int iy = blockIdx.x * blockDim.x + threadIdx.x;\n    if (ix >= nx || iy >= ny) return;\n\n    float p_joint = pxy[ix * ny + iy];\n    float p_x     = px[ix];\n    float p_y     = py[iy];\n\n    // Contribution to MI: p(x,y) * log(p(x,y) / (p(x)*p(y)))\n    float contrib = (p_joint > EPS) ?\n        p_joint * logf(p_joint / (p_x * p_y + EPS)) : 0.0f;\n\n    // TODO: reduce all contributions with atomicAdd\n    atomicAdd(out, contrib);\n}\n"}, "sgd-minibatch": {"slug": "sgd-minibatch", "title": "SGD Variants & Practical Tuning", "section": "Optimization", "topic": "SGD", "description": "Introduction All the optimizers we've discussed (Momentum, Adam, etc.) are variations on one core algorithm: Gradient Descent. But there's a fundamental choice that comes before everything else: How much data do you use to compute each gradient? The Batch Size Choice This choice, the batch size, affects everything: convergence speed, generalization, memory usage, and whether training works at all. It's one of the most important hyperparameters in deep learning. Batch Gradient Descent In classical (Batch) Gradient Descent, we compute the gradient using the entire dataset: рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқңӮ вӢ… 1 рқ‘Ғ вҲ‘ рқ‘– = 1 рқ‘Ғ вҲҮ рқҗҝ ( рқңғ рқ‘Ў ; рқ‘Ҙ рқ‘– , рқ‘Ұ рқ‘– ) Оё t+1 вҖӢ =Оё t вҖӢ вҲ’О·вӢ… N 1 вҖӢ вҲ‘ i=1 N вҖӢ вҲҮL(Оё t вҖӢ ;x i вҖӢ ,y i вҖӢ ) Advantages Gradient is accurate (no sampling noise) Stable, predictable convergence Easy to analyze theoretically Disadvantages Extremely slow (one step = full dataset pass) Requires all data in memory Can't escape local minima Batch GD Failure Case Deterministic gradients get trapped in local minima Left Right Run Local Global Descending... Following steepest descent... Gradient -5.4720 Loss 2.8265 Position -1.800 Iteration 0 KEY INSIGHT Left of saddle leads to local min. No escape! Batch GD is impractical for modern deep learning. Training GPT on the full internet for one gradient update would take years. Stochastic Gradient Descent (SGD) At the opposite extreme, Stochastic GD uses a single random sample: рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқңӮ вӢ… вҲҮ рқҗҝ ( рқңғ рқ‘Ў ; рқ‘Ҙ рқ‘– , рқ‘Ұ рқ‘– ) Оё t+1 вҖӢ =Оё t вҖӢ вҲ’О·вӢ…вҲҮL(Оё t вҖӢ ;x i вҖӢ ,y i вҖӢ ) where (x_i, y_i) is a single randomly chosen sample Why Stochasticity Helps The gradient from one sample is a noisy approximation of the true gradient. But this noise is not always bad: Acts like exploration in the loss landscape Helps escape shallow local minima and saddle points Serves as implicit regularization Mini-Batch SGD: The Sweet Spot In practice, we use mini-batches: small random subsets of the data. рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқңӮ вӢ… 1 рқҗө вҲ‘ рқ‘– вҲҲ рқҗө вҲҮ рқҗҝ ( рқңғ рқ‘Ў ; рқ‘Ҙ рқ‘– , рқ‘Ұ рқ‘– ) Оё t+1 вҖӢ =Оё t вҖӢ вҲ’О·вӢ… B 1 вҖӢ вҲ‘ iвҲҲB вҖӢ вҲҮL(Оё t вҖӢ ;x i вҖӢ ,y i вҖӢ ) where B is a mini-batch of size 32, 64, 128, 256, etc. Variance Reduction Averaging over B samples reduces gradient noise by factor of 1 / рқҗө 1/ B вҖӢ . Hardware Efficiency GPUs are optimized for matrix ops. A batch of 64 is nearly as fast as a batch of 1. Memory Constraint Batch must fit in GPU memory. Larger batches = more memory usage. Interactive: Batch Size Effect Watch how batch size affects the optimization path. Smaller batches = more noise = more exploration. Batch Size Impact How sample size determines the \"smoothness\" of the optimization path. Batch Size (B): 1 32 256 HIGH NOISE LOW NOISE Batch Size: 32 CURRENT LOSS 49.0000 Steps Taken 0 Balanced Medium batches offer a trade-off: enough noise to explore, but stable enough to converge efficiently. Gradient Update Rule рқңғ рқ‘Ў + 1 = рқңғ рқ‘Ў вҲ’ рқңӮ ( вҲҮ рқҗҝ + рқ‘Ғ ( 0 , рқңҺ / рқҗө ) ) Оё t+1 вҖӢ =Оё t вҖӢ вҲ’О·(вҲҮL+N(0,Пғ/ B вҖӢ )) Interactive: Gradient Noise See how batch size reduces gradient variance. The Central Limit Theorem in action! Batch Size vs. Gradient Noise Visualize how averaging over a batch reduces estimation variance. Batch Size: - 32 + True Gradient (1.0) STOCHASTIC BATCH SIZE STABLE THEORETICAL NOISE ( рқңҺ ОЈ) 0.354 вҲқ 1 / рқҗө вҲқ1/ B вҖӢ CURRENT DEVIATION 0.098 Balanced noise. Key Insight Increasing batch size B reduces gradient noise by рқҗө B вҖӢ . To use large batches effectively, you often need to increase the Learning Rate linearly or by square root to compensate for the reduced noise/variance distribution. Batch Size Tradeoffs Aspect Small Batch (32) Large Batch (2048+) Gradient Noise High Low Exploration Good (escapes local minima) Poor (gets stuck) Generalization Often better Can be worse Training Speed Slower (more steps) Faster (fewer steps) GPU Utilization Under-utilized Fully utilized Memory Low High The Large Batch Problem Keskar et al. (2017) showed that large batch training finds sharp minima that generalize poorly. The noise in small batches acts as implicit regularization, pushing toward flat mi", "url": "https://www.tensortonic.com/ml-math/optimization/sgd-variants?problem=sgd-minibatch", "template": "// SGD update: Оё = Оё - lr * grad\n// Each thread updates one parameter\n#include <cuda_runtime.h>\n\n__global__ void sgd_update(float* params, const float* grads,\n                            float lr, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n)\n        params[i] -= lr * grads[i];\n}\n\n// With L2 regularization (weight decay):\n__global__ void sgd_update_l2(float* params, const float* grads,\n                               float lr, float wd, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i < n)\n        params[i] -= lr * (grads[i] + wd * params[i]);\n}\n\n// Launch: sgd_update<<<(n+255)/256, 256>>>(d_params, d_grads, lr, n);\n"}, "information-gain": {"slug": "information-gain", "title": "Information Gain", "section": "Info Theory", "topic": "Information Gain", "description": "Introduction Building a Decision Tree involves asking a sequence of questions to split your data. But which question should you ask first? Should you ask \"Is it raining?\" or \"Is it humid?\" first? To answer this, we need a way to measure how much \"cleaner\" (purer) the data becomes after a split. Information Gain (IG) is exactly this measure. It quantifies the reduction in entropy (uncertainty) achieved by splitting on a specific feature. It is essentially Mutual Information between the feature and the label. Intuition: The 20 Questions Game Imagine playing \"20 Questions.\" Your goal is to identify a secret object with yes/no questions. Bad Question \"Is the object a banana?\" 99% chance the answer is \"No.\" You are left with almost the same uncertainty. Low Information Gain. Good Question \"Is the object alive?\" Splits the world roughly in half. Regardless of the answer, you have eliminated 50% of possibilities. High Information Gain. Decision Trees use Information Gain to find the \"Is it alive?\" questions, not the \"Is it a banana?\" questions. Recap: Entropy as Impurity Before we split, we calculate the entropy of the current dataset (the parent node). Entropy measures \"impurity\" or \"disorder.\" рқҗ» ( рқ‘Ҷ ) = вҲ’ вҲ‘ рқ‘– = 1 рқ‘җ рқ‘қ рқ‘– log вҒЎ 2 ( рқ‘қ рқ‘– ) H(S)=вҲ’вҲ‘ i=1 c вҖӢ p i вҖӢ log 2 вҖӢ (p i вҖӢ ) Pure (H = 0): All samples same class. Impure (H = 1): 50/50 split. The Information Gain Formula Information Gain = Entropy Before - Entropy After. Since a split creates multiple child nodes, \"Entropy After\" is the weighted average of child entropies. рқҗј рқҗә ( рқ‘Ҷ , рқҗҙ ) = рқҗ» ( рқ‘Ҷ ) вҲ’ вҲ‘ рқ‘Ј вҲҲ рқ‘ү рқ‘Һ рқ‘ҷ рқ‘ў рқ‘’ рқ‘  ( рқҗҙ ) вҲЈ рқ‘Ҷ рқ‘Ј вҲЈ вҲЈ рқ‘Ҷ вҲЈ рқҗ» ( рқ‘Ҷ рқ‘Ј ) IG(S,A)=H(S)вҲ’вҲ‘ vвҲҲValues(A) вҖӢ вҲЈSвҲЈ вҲЈS v вҖӢ вҲЈ вҖӢ H(S v вҖӢ ) H(S) Entropy of parent node. Weighted Sum Large children matter more than small ones. H(S_v) Entropy of child node v. Interactive: Split Visualization Drag the split point to see how Information Gain changes. The best split creates the purest child nodes. Recursive Partitioning Build a Depth-2 Decision Tree. First split the root, then split the children. Auto-Build Tree Reset Root Split IG: 0.001 Left Split + Add Right Split + Add Root Class 1 Class 0 Total Information Gain: 0.001 bits (Sum of IG at each active node) Step-by-Step Calculation Dataset: 10 examples, 5 Positive (+), 5 Negative (-). Testing feature \"Windy\" (True/False). Step 1: Parent Entropy рқҗ» ( рқ‘ғ рқ‘Һ рқ‘ҹ рқ‘’ рқ‘ӣ рқ‘Ў ) = вҲ’ 0.5 log вҒЎ 2 ( 0.5 ) вҲ’ 0.5 log вҒЎ 2 ( 0.5 ) = 1.0 bit H(Parent)=вҲ’0.5log 2 вҖӢ (0.5)вҲ’0.5log 2 вҖӢ (0.5)=1.0 bit Step 2: Split Data Windy=False (6 samples): 4 Pos, 2 Neg Windy=True (4 samples): 1 Pos, 3 Neg Step 3: Child Entropies Left: рқҗ» = вҲ’ 4 6 log вҒЎ 2 4 6 вҲ’ 2 6 log вҒЎ 2 2 6 вүҲ 0.918 H=вҲ’ 6 4 вҖӢ log 2 вҖӢ 6 4 вҖӢ вҲ’ 6 2 вҖӢ log 2 вҖӢ 6 2 вҖӢ вүҲ0.918 Right: рқҗ» = вҲ’ 1 4 log вҒЎ 2 1 4 вҲ’ 3 4 log вҒЎ 2 3 4 вүҲ 0.811 H=вҲ’ 4 1 вҖӢ log 2 вҖӢ 4 1 вҖӢ вҲ’ 4 3 вҖӢ log 2 вҖӢ 4 3 вҖӢ вүҲ0.811 Step 4: Information Gain рқҗј рқҗә = 1.0 вҲ’ [ 6 10 Г— 0.918 + 4 10 Г— 0.811 ] IG=1.0вҲ’[ 10 6 вҖӢ Г—0.918+ 10 4 вҖӢ Г—0.811] рқҗј рқҗә = 1.0 вҲ’ 0.875 = 0.125 bits IG=1.0вҲ’0.875=0.125 bits The ID3 Algorithm ID3 (Iterative Dichotomiser 3) uses Information Gain to build trees greedily: Calculate H(S) for the current node. For every possible feature A, calculate IG(S, A). Select the feature with the highest Information Gain. Split the data using that feature. Recurse on each child until nodes are pure or max depth is reached. Gini Impurity vs Entropy Scikit-Learn's CART algorithm uses Gini Impurity by default instead of Entropy. Why? Entropy вҲ’ вҲ‘ рқ‘қ log вҒЎ рқ‘қ вҲ’вҲ‘plogp Pro: Information-theoretically grounded. Con: Slower (log computation). Gini Impurity 1 вҲ’ вҲ‘ рқ‘қ 2 1вҲ’вҲ‘p 2 Pro: Faster (only square). Con: Similar results (~95% same splits). In practice, they produce nearly identical trees. Gini is default because it is slightly faster. Gini Impurity vs Entropy Compare the shape of Gini Impurity and Entropy. Notice how Gini is just a quadratic approximation of Entropy. Probability p (Class 1): 0.50 Entropy H(p) 1.000 Max at p=0.5 (1.0 bits) Gini Impurity G(p) 0.500 Max at p=0.5 (0.5) --- Dashed Green is Entropy scaled by 0.5. It ", "url": "https://www.tensortonic.com/ml-math/information-theory/information-gain?problem=information-gain", "template": "// Information Gain: IG(Y|X) = H(Y) - H(Y|X)\n// H(Y|X) = ОЈ_x p(x) * H(Y|X=x) вҖ” used in decision trees\n#include <cuda_runtime.h>\n#define EPS 1e-7f\n\n__device__ float entropy_of(const float* probs, int n) {\n    float h = 0;\n    for (int i = 0; i < n; i++) {\n        if (probs[i] > EPS)\n            h -= probs[i] * logf(probs[i]);\n    }\n    return h;\n}\n\n__global__ void conditional_entropy(const float* p_x, const float** p_y_given_x,\n                                     float* H_Y_given_X, int nx, int ny) {\n    int xi = blockIdx.x * blockDim.x + threadIdx.x;\n    if (xi >= nx) return;\n    H_Y_given_X[xi] = p_x[xi] * entropy_of(p_y_given_x[xi], ny);\n}\n// IG = H(Y) - sum(H_Y_given_X)\n"}, "taylor-approximation": {"slug": "taylor-approximation", "title": "Taylor Series Approximation", "section": "Calculus", "topic": "Taylor Series", "description": "Introduction Computers are surprisingly limited. At the hardware level, they can only add, subtract, multiply, and divide. So how does your calculator compute sin вҒЎ ( 1.5 ) sin(1.5) or рқ‘’ 2.5 e 2.5 ? It cheats. It replaces these complex transcendental functions with really long polynomials. Polynomials are just addition and multiplication, which computers understand. Why This Matters for ML Gradient Descent: First-order Taylor approx (linear) justifies the update rule. Newton's Method: Second-order Taylor approx (quadratic) enables smarter steps. XGBoost: Uses Taylor expansion of loss for efficient tree construction. Understanding Optimization: Taylor series explains why optimization algorithms work. The Core Idea Imagine forging a signature. To make your forgery match the original at a specific point, you need to match several properties: 0 Position Your approximation passes through the same point. f(a) = P(a) 1 Velocity (Slope) The curve is going in the same direction. f'(a) = P'(a) 2 Acceleration (Curvature) The curve bends at the same rate. f''(a) = P''(a) Match enough derivatives at point a, and your polynomial becomes indistinguishable from the original function near that point. The Taylor Formula The Taylor series of f(x) centered at point a is: рқ‘“ ( рқ‘Ҙ ) = рқ‘“ ( рқ‘Һ ) + рқ‘“ вҖІ ( рқ‘Һ ) ( рқ‘Ҙ вҲ’ рқ‘Һ ) + рқ‘“ вҖІ вҖІ ( рқ‘Һ ) 2 ! ( рқ‘Ҙ вҲ’ рқ‘Һ ) 2 + рқ‘“ вҖІ вҖІ вҖІ ( рқ‘Һ ) 3 ! ( рқ‘Ҙ вҲ’ рқ‘Һ ) 3 + вӢҜ f(x)=f(a)+f вҖІ (a)(xвҲ’a)+ 2! f вҖІвҖІ (a) вҖӢ (xвҲ’a) 2 + 3! f вҖІвҖІвҖІ (a) вҖӢ (xвҲ’a) 3 +вӢҜ General form: рқ‘“ ( рқ‘Ҙ ) = вҲ‘ рқ‘ӣ = 0 вҲһ рқ‘“ ( рқ‘ӣ ) ( рқ‘Һ ) рқ‘ӣ ! ( рқ‘Ҙ вҲ’ рқ‘Һ ) рқ‘ӣ f(x)=вҲ‘ n=0 вҲһ вҖӢ n! f (n) (a) вҖӢ (xвҲ’a) n Maclaurin Series When a = 0, we call it a Maclaurin series. Common examples you should know: рқ‘’ рқ‘Ҙ = 1 + рқ‘Ҙ + рқ‘Ҙ 2 2 ! + рқ‘Ҙ 3 3 ! + вӢҜ e x =1+x+ 2! x 2 вҖӢ + 3! x 3 вҖӢ +вӢҜ sin вҒЎ рқ‘Ҙ = рқ‘Ҙ вҲ’ рқ‘Ҙ 3 3 ! + рқ‘Ҙ 5 5 ! вҲ’ вӢҜ sinx=xвҲ’ 3! x 3 вҖӢ + 5! x 5 вҖӢ вҲ’вӢҜ Convergence The series converges to f(x) within a \"radius of convergence.\" Further from a, more terms are needed for accuracy. Interactive: Taylor Approximation Watch how higher-order Taylor polynomials approximate sin(x) better and better near the center point. Taylor Approximation Approximating sin вҒЎ ( рқ‘Ҙ ) sin(x) with polynomials. Move the center a. Error Area AUTO PLAY Reset a x y -2ПҖ -ПҖ ПҖ 2ПҖ Configuration Order (n) 1 Constant Linear Quadratic High Order Center (a) 0.00 POLYNOMIAL TERMS рқ‘“ ( рқ‘Ҙ ) вүҲ вҲ‘ рқ‘ҳ = 0 1 рқ‘“ ( рқ‘ҳ ) ( рқ‘Һ ) рқ‘ҳ ! ( рқ‘Ҙ вҲ’ рқ‘Һ ) рқ‘ҳ f(x)вүҲвҲ‘ k=0 1 вҖӢ k! f (k) (a) вҖӢ (xвҲ’a) k k=0 0.00/ 0 вҖў (x-a)^0 k=1 1.00/ 1 вҖў (x-a)^1 Notice how the green curve \"hugs\" the blue curve closer as Order increases. Orders of Approximation In optimization, we typically use only the first few terms: First-Order (Linear) рқ‘“ ( рқ‘Ҙ ) вүҲ рқ‘“ ( рқ‘Һ ) + рқ‘“ вҖІ ( рқ‘Һ ) ( рқ‘Ҙ вҲ’ рқ‘Һ ) f(x)вүҲf(a)+f вҖІ (a)(xвҲ’a) Approximates f as a straight line (tangent). This is what gradient descent \"sees.\" Second-Order (Quadratic) рқ‘“ ( рқ‘Ҙ ) вүҲ рқ‘“ ( рқ‘Һ ) + рқ‘“ вҖІ ( рқ‘Һ ) ( рқ‘Ҙ вҲ’ рқ‘Һ ) + рқ‘“ вҖІ вҖІ ( рқ‘Һ ) 2 ( рқ‘Ҙ вҲ’ рқ‘Һ ) 2 f(x)вүҲf(a)+f вҖІ (a)(xвҲ’a)+ 2 f вҖІвҖІ (a) вҖӢ (xвҲ’a) 2 Approximates f as a parabola. Includes curvature via Hessian. Multivariate Taylor Series Neural networks have vector inputs. The multivariate second-order Taylor expansion is: рқ‘“ ( рқ‘Ҙ ) вүҲ рқ‘“ ( рқ‘Һ ) + вҲҮ рқ‘“ ( рқ‘Һ ) рқ‘Ү ( рқ‘Ҙ вҲ’ рқ‘Һ ) + 1 2 ( рқ‘Ҙ вҲ’ рқ‘Һ ) рқ‘Ү рқҗ» ( рқ‘Һ ) ( рқ‘Ҙ вҲ’ рқ‘Һ ) f(x)вүҲf(a)+вҲҮf(a) T (xвҲ’a)+ 2 1 вҖӢ (xвҲ’a) T H(a)(xвҲ’a) Constant term f(a): current value Linear term gradient: direction of change Quadratic term Hessian: curvature info Connection to Optimization Why Gradient Descent Works Near our current point theta, the loss looks like a plane: рқҗҝ ( рқңғ + рқң– ) вүҲ рқҗҝ ( рқңғ ) + рқң– рқ‘Ү вҲҮ рқҗҝ L(Оё+Пө)вүҲL(Оё)+Пө T вҲҮL To minimize, we want рқң– рқ‘Ү вҲҮ рқҗҝ Пө T вҲҮL as negative as possible. This means pointing epsilon opposite to the gradient. Newton's Method Uses the quadratic approximation. If f is approximately a parabola, we can jump directly to its minimum: рқңғ рқ‘ӣ рқ‘’ рқ‘Ө = рқңғ рқ‘ң рқ‘ҷ рқ‘‘ вҲ’ рқҗ» вҲ’ 1 вҲҮ рқ‘“ Оё new вҖӢ =Оё old вҖӢ вҲ’H вҲ’1 вҲҮf Much faster convergence than GD, but computing HвҒ»В№ is O(nВі). ML Applications XGBoost's Second-Order Objective XGBoost approximates the loss using second-order Taylor expansion: рқҗҝ вүҲ вҲ‘ [ рқ‘” рқ‘– рқ‘“ рқ‘Ў + 1 2 в„Һ рқ‘– рқ‘“ рқ‘Ў 2 ] LвүҲвҲ‘[g i вҖӢ f t вҖӢ + 2 1 вҖӢ h i вҖӢ f t 2 вҖӢ ] ", "url": "https://www.tensortonic.com/ml-math/calculus/taylor-series?problem=taylor-approximation", "template": "// Taylor: f(x) вүҲ ОЈ_k f^(k)(a)/k! * (x-a)^k\n// Evaluate polynomial on GPU вҖ” each thread handles one x point\n#include <cuda_runtime.h>\n\n__global__ void taylor_eval(const float* coeffs, int degree,\n                             const float* x_pts, float* y_pts,\n                             float a, int n) {\n    int i = blockIdx.x * blockDim.x + threadIdx.x;\n    if (i >= n) return;\n\n    float dx  = x_pts[i] - a;\n    float val = 0.0f;\n    float pw  = 1.0f;  // (x-a)^k\n\n    for (int k = 0; k <= degree; k++) {\n        val += coeffs[k] * pw;\n        pw  *= dx;\n    }\n    y_pts[i] = val;\n}\n"}, "p-value-from-z": {"slug": "p-value-from-z", "title": "P-Values: The Surprise Factor", "section": "Statistics", "topic": "P-Values", "description": "Context: This chapter dives deep into P-values. If you need a refresher on Null/Alternative hypotheses and the overall testing framework, see theHypothesis Testing chapter first. The Intuition: How \"Surprised\" Are You? Forget the math for a second. Think of the p-value as a Surprise Meter. It measures how weird your observed data would be if the Null Hypothesis were actually true. The Coin Toss Analogy Your friend gives you a coin. The Null Hypothesis ( рқҗ» 0 H 0 вҖӢ ) is that the coin is fair. You flip it 10 times: Scenario A: 5 Heads, 5 Tails Are you surprised? No. This is exactly
